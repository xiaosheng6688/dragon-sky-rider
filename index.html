<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Dragon Rider</title>
<style>
*{margin:0;padding:0}
body{background:#111;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
var C=document.getElementById('c'),X=C.getContext('2d');
var W,H,rL,rR,lW,mid=[0,0,0];
var lane=1,yo=0;
var pX,pY,pW=50,pH=65;
var score=0,coins=0,lives=3,spd=3,frm=0;
var obs=[],cns=[],pts=[];
var over=false,flash=0;

function RS(){
  W=innerWidth;H=innerHeight;C.width=W;C.height=H;
  rL=W*.12;rR=W*.88;lW=(rR-rL)/3;
  for(var i=0;i<3;i++)mid[i]=rL+lW*(i+.5);
  pX=mid[1];pY=H-130-pH/2;
}RS();onresize=RS;

function RND(n){return Math.random()*n}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function so(){
  if(RND(1)<.025&&frm%3==0){
    var l=Math.floor(RND(3));
    obs.push({l:l,y:-90,w:44,h:64});
  }
}
function sc(){
  if(RND(1)<.035){
    var l=Math.floor(RND(3));
    cns.push({l:l,y:-40,r:11});
  }
}

function UP(){
  if(over)return;
  frm++;yo+=spd*.7;
  var tx=mid[lane];pX+=(tx-pX)*.3;
  spd=3+frm*.003;
  so();sc();

  // obstacles
  for(var i=0;i<obs.length;i++){
    var o=obs[i];o.y+=spd;
    var ox=mid[o.l];
    if(Math.abs(ox-pX)<pW*.75&&Math.abs(o.y-pY)<pH*.75){lives--;pts.push({x:pX,y:pY,vy:-4,life:30});flash=.3;if(lives<=0)over=true;break}
  }
  obs=obs.filter(function(o){return o.y<H+150});

  // coins
  for(var j=0;j<cns.length;j++){
    var cn=cns[j];cn.y+=spd;
    if(cn.l===lane&&Math.abs(cn.y-pY)<pH*.65){cns.splice(j,1);j--;coins++;score+=3}
  }

  // particles
  for(var k=0;k<pts.length;k++){pts[k].y+=pts[k].vy;pts[k].life--}
  pts=pts.filter(function(p){return p.life>0});
  if(flash>0)flash-=.02;
}

function DBG(){
  // Night sky gradient
  var g=X.createLinearGradient(0,0,0,H*.65);
  g.addColorStop(0,'#0b0b2e');g.addColorStop(.5,'#1a1040');g.addColorStop(1,'#2d1b58');
  X.fillStyle=g;X.fillRect(0,0,W,H*.65);
  // Stars
  for(var i=0;i<25;i++){
    X.globalAlpha=.15+.25*Math.sin(frm*.02+i);
    X.fillStyle='#fff';
    X.beginPath();X.arc((i*157+frm)%W,(i*89+H*.15)%(H*.6),1,0,7);
    X.fill();
  }
  X.globalAlpha=1;
  // Side grass
  X.fillStyle='#1e5631';X.fillRect(0,0,rL,H);
  X.fillStyle='#1e5631';X.fillRect(rR,0,W-rR,H);
  // Simple trees
  X.fillStyle='#153a1e';
  for(var t=0;t<7;t++){var tx=rL+20+t*(rL-30)/6,ty=H*.28+(t*83)%(H*.4);X.beginPath();X.moveTo(tx-18,ty+22);X.lineTo(tx,ty-18);X.lineTo(tx+18,ty+22);X.fill()}
  for(var t2=0;t2<7;t2++){var tx2=rR+30+t2*(W-rR-50)/6,ty2=H*.22+(t2*91)%(H*.45);X.beginPath();X.moveTo(tx2-18,ty2+22);X.lineTo(tx2,ty2-18);X.lineTo(tx2+18,ty2+22);X.fill()}
}

function DROAD(){
  // Road surface - clearly different from grass
  X.fillStyle='#3a3a4a';X.fillRect(rL,0,rR-rL,H);
  // Dashed lane markers (animated)
  for(var i=0;i<3;i++){
    var lx=mid[i];
    X.fillStyle='rgba(255,255,255,.18)';
    var off=yo%70;
    for(var j=-70+off;j<H;j+=70)X.fillRect(lx-10,j,20,10);
  }
  // Golden borders
  X.strokeStyle='#e6b800';X.lineWidth=4;
  X.strokeRect(rL-2,0,rR-rL+4,H);
  // White dotted lane lines
  for(var k=1;k<3;k++){
    var lx=rL+lW*k;
    X.strokeStyle='rgba(255,255,255,.35)';X.lineWidth=2.5;
    X.setLineDash([28,20]);
    X.beginPath();X.moveTo(lx,0);X.lineTo(lx,H);X.stroke();
    X.setLineDash([]);
  }
}

function DPLYR(){
  X.save();X.translate(pX,pY);
  // Shadow
  X.fillStyle='rgba(0,0,0,.5)';X.beginPath();X.ellipse(0,pH*.38,pW*.48,4,0,0,7);X.fill();
  // Car body
  var g=X.createLinearGradient(0,-pH/2,0,pH/2);
  g.addColorStop(0,'#FFA047');g.addColorStop(.4,'#FF6B35');g.addColorStop(1,'#CC3300');
  X.fillStyle=g;
  // rounded rect manually
  var bx=-pW/2,by=-pH/2,bw=pW,bh=pH,br=14;
  X.beginPath();X.moveTo(bx+br,by);X.lineTo(bx+bw-br,by);X.quadraticCurveTo(bx+bw,by,bx+bw,by+br);
  X.lineTo(bx+bw,by+bh-br);X.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);
  X.lineTo(bx+br,by+bh);X.quadraticCurveTo(bx,by+bh,bx,by+bh-br);
  X.lineTo(bx,by+br);X.quadraticCurveTo(bx,by,bx+br,by);X.closePath();X.fill();
  // Windshield
  X.fillStyle='rgba(180,215,255,.5)';X.fillRect(-pW*.2,-pH*.35,pW*.4,pH*.24);
  // Headlights
  X.fillStyle='#FFEAB0';X.beginPath();X.arc(-pW*.27,0,pW*.09,0,7);X.fill();X.beginPath();X.arc(pW*.27,0,pW*.09,0,7);X.fill();
  // Wheels
  X.fillStyle='#1a1a1a';X.fillRect(-pW*.5,pH*.25,pW*.18,pH*.12);X.fillRect(pW*.32,pH*.25,pW*.18,pH*.12);
  // Flame
  var fh=14+Math.sin(frm*.2)*5;
  X.fillStyle='#FF3822';X.beginPath();X.moveTo(-pW*.1,pH/2);X.lineTo(0,pH/2+fh);X.lineTo(pW*.1,pH/2);X.fill();
  X.fillStyle='#FFC800';X.beginPath();X.moveTo(-pW*.05,pH/2);X.lineTo(0,pH/2+fh*.55);X.lineTo(pW*.05,pH/2);X.fill();
  // Dragon emblem
  X.fillStyle='#F90';X.beginPath();X.moveTo(-pW*.09,-pH*.47);X.lineTo(0,-pH*.33);X.lineTo(pW*.09,-pH*.47);X.fill();
  X.fillStyle='#111';X.beginPath();X.arc(-pW*.04,-pH*.42,3,0,7);X.fill();X.beginPath();X.arc(pW*.04,-pH*.42,3,0,7);X.fill();
  X.restore();
}

function DOBS(){
  for(var i=0;i<obs.length;i++){
    var o=obs[i];if(o.y<-90||o.y>H+90)continue;
    var ox=mid[o.l];
    X.fillStyle='#DC2626';
    // rounded rect for barrel
    var bx2=ox-o.w/2,by2=o.y-o.h/2,bw2=o.w,bh2=o.h,br2=8;
    X.beginPath();X.moveTo(bx2+br2,by2);X.lineTo(bx2+bw2-br2,by2);X.quadraticCurveTo(bx2+bw2,by2,bx2+bw2,by2+br2);
    X.lineTo(bx2+bw2,by2+bh2-br2);X.quadraticCurveTo(bx2+bw2,by2+bh2,bx2+bw2-br2,by2+bh2);
    X.lineTo(bx2+br2,by2+bh2);X.quadraticCurveTo(bx2,by2+bh2,bx2,by2+bh2-br2);
    X.lineTo(bx2,by2+br2);X.quadraticCurveTo(bx2,by2,bx2+br2,by2);X.closePath();X.fill();
    // barrel bands
    X.strokeStyle='#7F1D1D';X.lineWidth=2.5;
    X.beginPath();X.moveTo(bx2,by2+12);X.lineTo(bx2+bw2,by2+12);X.stroke();
    X.beginPath();X.moveTo(bx2,by2+bh2-12);X.lineTo(bx2+bw2,by2+bh2-12);X.stroke();
  }
}

function DCNS(){
  for(var i=0;i<cns.length;i++){
    var cn=cns[i];if(cn.y<-20)continue;
    var cx=mid[cn.l],cy=cn.y;
    var g=X.createRadialGradient(cx-2,cy-2,1,cx,cy,cn.r);
    g.addColorStop(0,'#FFE84D');g.addColorStop(1,'#C8860B');
    X.fillStyle=g;X.beginPath();X.arc(cx,cy,cn.r,0,7);X.fill();
    X.fillStyle='#8B6914';X.font='bold 14px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('楼',cx,cy+1);
  }
}

function DPTS(){
  for(var i=0;i<pts.length;i++){
    var p=pts[i];
    X.globalAlpha=p.life/30;
    X.fillStyle='#f44';X.beginPath();X.arc(p.x,p.y,3,0,7);X.fill();
  }
  X.globalAlpha=1;
}

function DHUD(){
  // Score bg
  X.fillStyle='rgba(0,0,0,.55)';X.fillRect(8,8,110,50);
  X.fillStyle='#fff';X.font='bold 18px monospace';X.textAlign='left';X.fillText('馃弳 '+score,16,30);
  X.font='15px monospace';X.fillText('馃挵 '+coins,16,48);
  // Lives
  X.textAlign='right';
  X.fillStyle='rgba(0,0,0,.55)';X.fillRect(W-62,8,54,30);
  X.fillStyle='#ef4444';X.font='18px serif';X.fillText('鈾?.repeat(lives),W-14,30);
  // Hint
  X.textAlign='center';
  X.fillStyle='rgba(255,255,255,.18)';X.font='12px monospace';X.fillText('swipe left/right to change lane',W/2,H-8);
}

// Input
var sx3=0,sy3=0;
document.addEventListener('touchstart',function(e){sx3=e.touches[0].clientX;sy3=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-sx3,dy=e.changedTouches[0].clientY-sy3;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>18){lane=clamp(lane+(dx>0?1:-1),0,2)}
  else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>18){lane=clamp(lane+(dy>0?1:-1),0,2)}
});
document.addEventListener('click',function(e){
  if(over){lives=3;score=0;coins=0;over=false;obs=[];cns=[];pts=[];spd=3;frm=0;return}
  lane=e.clientX<W/2?clamp(lane-1,0,2):clamp(lane+1,0,2);
});
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')lane=clamp(lane-1,0,2);if(e.key==='ArrowRight')lane=clamp(lane+1,0,2)});

(function loop(){
  try{UP()}catch(e){}
  try{
    X.save();
    DBG();DROAD();DOBS();DCNS();DPLYR();DPTS();DHUD();
    if(over){
      X.fillStyle='rgba(0,0,0,.78)';X.fillRect(0,0,W,H);
      X.textAlign='center';
      X.fillStyle='#FF6B35';X.font='bold 36px monospace';X.fillText('GAME OVER',W/2,H/2-24);
      X.fillStyle='#fff';X.font='17px monospace';X.fillText('Score: '+score+'  |  馃挵 '+coins,W/2,H/2+10);
      X.font='15px monospace';X.fillText('Tap to restart',W/2,H/2+34);
    }
    X.restore();
  }catch(e){}
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
