<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Dragon Rider</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;touch-action:none;-webkit-touch-callout:none}
canvas{display:block}
#ui{position:fixed;top:10px;left:10px;color:#fff;font:14px monospace;z-index:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>
<script>
'use strict';
const c=document.getElementById('c'),x=c.getContext('2d');
let W=0,H=0,laneW=0,roadLeft=0,roadRight=0;
let lane=1,yOffset=0;
let playerX=0,playerY=0,playerW=50,playerH=60;
let score=0,coins=0,lives=3,speed=3;
let obstacles=[],coinList=[],particles=[];
let isOver=false,flash=0;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  c.width=W;c.height=H;
  roadLeft=W*.15;roadRight=W*.85;
  laneW=(roadRight-roadLeft)/3;
  const cy=roadLeft+laneW*(lane+.5);
  playerX=cy;
  playerY=H-100-playerH/2;
}
resize();
window.onresize=resize;

// --- Spawn ---
let frame=0;
function spawnObstacle(){
  if(Math.random()>.02)return;
  const l=Math.floor(Math.random()*3);
  obstacles.push({l,y:-80,w:40,h:60});
}
function spawnCoin(){
  if(Math.random()<.03){const l=Math.floor(Math.random()*3);coinList.push({l,y:-30,r:10});}
}

// --- Update ---
function update(){
  if(isOver)return;
  frame++;
  yOffset+=speed*.8;
  playerX+=((roadLeft+laneW*(lane+.5))-playerX)*.25;
  playerY=H-100-playerH/2;

  spawnObstacle();spawnCoin();

  for(let o of obstacles){o.y+=speed;
    if(!o.hit&&o.y+o.h>playerY-playerH/2&&o.y<playerY+playerH/2&&o.l===lane){
      if(!o.hit){o.hit=true;lives--;particles.push({x:playerX,y:playerY,vx:0,vy:-3,life:30,c:'#f44'});flash=.3;
        if(lives<=0){isOver=true;score=Math.max(score,Math.floor((frame/60)*10))}}
    }
  }
  obstacles=obstacles.filter(o=>o.y<H+150);
  for(let c of coinList){c.y+=speed;
    if(Math.abs(c.y-playerY)<playerH/2&&c.l===lane){c.dead=true;coins++;score+=2}
  }
  coinList=coinList.filter(c=>!c.dead);
  for(let p of particles){p.y+=p.vy;p.life--}
  particles=particles.filter(p=>p.life>0);
  if(flash>0)flash-=.02;
  speed=3+frame*.002;
}

// --- Draw ---
function drawRoad(){
  const rw=roadRight-roadLeft;
  x.fillStyle='#1a1a3e';x.fillRect(roadLeft,0,rw,H);
  // lane lines
  for(let i=1;i<3;i++){
    const lx=roadLeft+laneW*i;
    x.strokeStyle='rgba(255,255,255,.12)';x.lineWidth=2;x.setLineDash([30,20]);
    x.beginPath();x.moveTo(lx,0);x.lineTo(lx,H);x.stroke();x.setLineDash([]);
  }
  // edge
  x.strokeStyle='rgba(255,255,255,.4)';x.lineWidth=3;
  x.strokeRect(roadLeft-1,0,roadRight-roadLeft+2,H);
  // dashed center markers moving
  for(let i=0;i<3;i++){
    const lx=roadLeft+laneW*(i+.5);
    x.fillStyle='rgba(255,255,255,.06)';
    const dOff=yOffset%80;
    for(let j=-80+dOff;j<H;j+=80)x.fillRect(lx-12,j,24,10);
  }
}

function drawPlayer(){
  const cx=playerX,cy=playerY;
  x.save();x.translate(cx,cy);
  // shadow
  x.fillStyle='rgba(0,0,0,.5)';x.beginPath();x.ellipse(0,playerH*.4,playerW*.55,6,0,0,Math.PI*2);x.fill();
  // body
  const g=x.createLinearGradient(0,-playerH/2,0,playerH/2);
  g.addColorStop(0,'#FF8C42');g.addColorStop(.5,'#FF6B35');g.addColorStop(1,'#CC4400');
  x.fillStyle=g;
  rrect(-playerW/2,-playerH/2,playerW,playerH,14);
  // windshield
  x.fillStyle='rgba(180,210,255,.55)';
  x.fillRect(-playerW*.25,-playerH*.38,playerW*.5,playerH*.28);
  // headlights
  x.fillStyle='#FFE8A0';x.beginPath();x.arc(-playerW*.3,-playerH*.05,playerW*.1,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(playerW*.3,-playerH*.05,playerW*.1,0,Math.PI*2);x.fill();
  // wheels
  x.fillStyle='#1a1a2e';rrect(-playerW*.48,playerH*.28,playerW*.2,playerH*.14,3);
  rrect(playerW*.28,playerH*.28,playerW*.2,playerH*.14,3);
  // flame
  const fh=12+Math.sin(frame*.25)*4;
  x.fillStyle='#FF3B30';x.beginPath();x.moveTo(-playerW*.15,playerH/2);x.lineTo(0,playerH/2+fh);x.lineTo(playerW*.15,playerH/2);x.fill();
  x.fillStyle='#FFCC00';x.beginPath();x.moveTo(-playerW*.08,playerH/2);x.lineTo(0,playerH/2+fh*.6);x.lineTo(playerW*.08,playerH/2);x.fill();
  // dragon head
  x.fillStyle='#FFAA00';
  x.beginPath();x.moveTo(-playerW*.12,-playerH*.5);x.lineTo(0,-playerH*.35);x.lineTo(playerW*.12,-playerH*.5);x.fill();
  x.fillStyle='#222';x.beginPath();x.arc(-playerW*.06,-playerH*.45,3,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(playerW*.06,-playerH*.45,3,0,Math.PI*2);x.fill();
  x.restore();
}

function drawObstacles(){
  for(let o of obstacles){
    if(o.y<-60||o.y>H+60)continue;
    const cx=roadLeft+laneW*(o.l+.5);
    x.fillStyle='#DC2626';
    rrect(cx-o.w/2,o.y-o.h/2,o.w,o.h,8);
    x.strokeStyle='#7F1D1D';x.lineWidth=2;
    x.beginPath();x.moveTo(cx-o.w/2,o.y-o.h/2+8);x.lineTo(cx+o.w/2,o.y-o.h/2+8);x.stroke();
    x.beginPath();x.moveTo(cx-o.w/2,o.y+o.h/2-8);x.lineTo(cx+o.w/2,o.y+o.h/2-8);x.stroke();
  }
}

function drawCoins(){
  for(let c of coinList){
    if(c.y<-10||c.y>H+10||c.dead)continue;
    const cx=roadLeft+laneW*(c.l+.5);
    const g=x.createRadialGradient(cx-1,c.y-1,2,cx,c.y,c.r);
    g.addColorStop(0,'#FFD700');g.addColorStop(1,'#B8860B');
    x.fillStyle=g;x.beginPath();x.arc(cx,c.y,c.r,0,Math.PI*2);x.fill();
    x.fillStyle='#8B6914';x.font='bold 12px serif';x.textAlign='center';x.textBaseline='middle';x.fillText('楼',cx,c.y+1);
  }
}

function drawParticles(){
  for(let p of particles){
    x.globalAlpha=p.life/30;
    x.fillStyle=p.c;x.beginPath();x.arc(p.x,p.y,3,0,Math.PI*2);x.fill();
  }
  x.globalAlpha=1;
}

function drawHUD(){
  x.fillStyle='#fff';x.font='bold 20px monospace';x.textAlign='left';
  x.fillText('馃弳 '+score,12,30);
  x.fillText('馃挵 '+coins,12,52);
  x.textAlign='right';
  x.fillStyle='#ef4444';x.font='18px monospace';
  x.fillText('鈾?'.repeat(lives),W-12,30);
  x.textAlign='left';
  x.fillStyle='rgba(255,255,255,.2)';x.font='11px monospace';
  x.fillText('鈼€ swipe/tap to switch 鈻?,W/2,20);x.textAlign='center';
}

function drawBg(){
  const g=x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0F0A2E');g.addColorStop(.5,'#1A1040');g.addColorStop(1,'#0A0A1E');
  x.fillStyle=g;x.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<25;i++){
    const sx=(i*137+frame)%W,sy=(i*97+H/3)%(H*.6);
    x.globalAlpha=.2+.3*Math.sin(frame*.02+i);
    x.fillStyle='#fff';x.beginPath();x.arc(sx,sy,1+Math.random(),0,2*Math.PI);x.fill();
  }
  x.globalAlpha=1;
}

function rrect(x,y,w,h,r){
  x.beginPath();x.moveTo(x+r,y);x.lineTo(x+w-r,y);
  x.quadraticCurveTo(x+w,y,x+w,y+r);x.lineTo(x+w,y+h-r);
  x.quadraticCurveTo(x+w,y+h,x+w-r,y+h);x.lineTo(x+r,y+h);
  x.quadraticCurveTo(x,y+h,x,y+h-r);x.lineTo(x,y+r);
  x.quadraticCurveTo(x,y,x+r,y);x.closePath();x.fill();
}

// --- Input ---
let swX=0,swY=0;
document.addEventListener('touchstart',e=>{
  swX=e.touches[0].clientX;swY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-swX;
  const dy=e.changedTouches[0].clientY-swY;
  if(Math.abs(dx)>15||Math.abs(dy)>15){
    if(dx>0)lane=Math.min(2,lane+1);
    else if(dx<0)lane=Math.max(0,lane-1);
    else if(dy>0)lane=Math.min(2,lane+1);
    else lane=Math.max(0,lane-1);
  }
});
document.addEventListener('click',e=>{
  if(isOver){lives=3;score=0;coins=0;isOver=false;obstacles=[];coinList=[];speed=3;frame=0}
  else{lane=e.clientX<W/2?Math.max(0,lane-1):Math.min(2,lane+1)}
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')lane=Math.max(0,lane-1);
  if(e.key==='ArrowRight')lane=Math.min(2,lane+1);
});

// --- Loop ---
(function loop(){
  if(!isOver)update();
  x.save();
  drawBg();drawRoad();drawObstacles();drawCoins();drawPlayer();drawParticles();drawHUD();
  if(isOver){
    x.fillStyle='rgba(0,0,0,.7)';x.fillRect(0,0,W,H);
    x.fillStyle='#fff';x.font='bold 36px monospace';x.textAlign='center';
    x.fillText('Game Over',W/2,H/2-20);
    x.font='18px monospace';x.fillStyle='#ff8c42';
    x.fillText('Score: '+score+'  |  Coins: '+coins,W/2,H/2+20);
    x.fillText('Tap to restart',W/2,H/2+46);
  }
  x.restore();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
