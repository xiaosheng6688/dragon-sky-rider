<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Sky Dragon Rider</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111827;
  font-family:'PingFang SC','Segoe UI',sans-serif;touch-action:manipulation;
  user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;inset:0}
#overlay{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center}
.screen{display:none;flex-direction:column;align-items:center;text-align:center;max-width:360px;width:92%;padding:16px 12px;background:linear-gradient(180deg,rgba(17,24,39,.96),rgba(10,18,35,.96));border-radius:20px;border:1px solid rgba(255,255,255,.06);box-shadow:0 0 50px rgba(99,102,241,.15)}
.screen.on{display:flex;gap:8px}
h1{font-size:30px;font-weight:900;background:linear-gradient(135deg,#F3B33D,#F4728E,#F3B33D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:11px;color:#7B8CC0}
.stats{display:flex;gap:20px;margin:2px 0}
.st{text-align:center}.st-v{font-size:24px;font-weight:800;color:#F3B33D}.st-l{font-size:9px;color:#5566AA}
.row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.btn{border:none;border-radius:36px;font-weight:700;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.93)}
.b-play{padding:12px 40px;font-size:16px;background:linear-gradient(135deg,#F4728E,#F43F5E);color:#fff;box-shadow:0 4px 20px rgba(244,114,142,.3)}
.b-ghost{padding:8px 20px;font-size:12px;background:rgba(255,255,255,.05);color:#8CA0D0;border:1px solid rgba(255,255,255,.08)}
.b-sm{padding:7px 16px;font-size:11px;border-radius:22px}
.b-unlock{padding:7px 18px;font-size:11px;background:linear-gradient(135deg,#F3B33D,#E8902A);color:#1A0A00;font-weight:700}
.diff-btn{padding:6px 15px;border-radius:16px;font-size:11px;font-weight:600;background:rgba(255,255,255,.04);color:#7B8CC0;border:1.5px solid rgba(255,255,255,.08);cursor:pointer}
.diff-btn.sel{background:rgba(244,114,142,.12);border-color:#F4728E;color:#F4728E}

.tabs{display:flex;gap:2px}
.tab{padding:5px 12px;border-radius:12px;font-size:10px;cursor:pointer;background:rgba(255,255,255,.03);color:#7B8CC0;border:none}
.tab.sel{background:rgba(99,102,241,.16);color:#818CF8}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;max-height:180px;overflow-y:auto;width:100%;padding:2px}
.shop-it{background:rgba(255,255,255,.03);border-radius:10px;padding:7px 5px;cursor:pointer;border:1px solid transparent}
.shop-it.owned{background:rgba(243,179,61,.07);border-color:rgba(243,179,61,.2)}
.shop-it .si{font-size:24px}.shop-it .sn{font-size:9px;color:#A8C0FF;margin:1px 0}.shop-it .sc{font-size:9px;font-weight:700;color:#F3B33D}.shop-it .so{font-size:8px;color:#4ADE80}

.big{font-size:48px;font-weight:900;color:#F3B33D;text-shadow:0 0 20px rgba(243,179,61,.25)}
.go-sub{font-size:12px;color:#8CA0D0}
.badges{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:300px}
.badge{display:inline-flex;align-items:center;gap:2px;padding:3px 9px;border-radius:10px;font-size:9px;font-weight:600}
.bg-g{background:linear-gradient(135deg,#F3B33D,#E8902A);color:#1A0A00}
.bg-s{background:linear-gradient(135deg,#B0BAC0,#D0D8E0);color:#222}
.bg-b{background:linear-gradient(135deg,#C8843C,#D89850);color:#fff}
.bg-p{background:linear-gradient(135deg,#F4728E,#E83A6A);color:#fff}

.lang-toggle{position:fixed;top:10px;left:10px;z-index:6;color:rgba(255,255,255,.2);font-size:13px;cursor:pointer;padding:3px 9px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.swipe-hint{position:fixed;bottom:24px;left:0;right:0;z-index:6;text-align:center;color:rgba(255,255,255,.15);font-size:12px;pointer-events:none}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div class="lang-toggle" id="langBtn" onclick="toggleLang()">馃寪 EN</div>
<div id="overlay">
  <div class="screen on" id="s1">
    <h1>馃悏</h1>
    <div class="sub" data-t="sub"></div>
    <div class="stats">
      <div class="st"><div class="st-v" id="bestDisp">0</div><div class="st-l">馃弳</div></div>
      <div class="st"><div class="st-v" id="coinDisp">0</div><div class="st-l">馃挵</div></div>
      <div class="st"><div class="st-v" id="lvlDisp">1</div><div class="st-l">猸?/div></div>
    </div>
    <div class="row"><button class="diff-btn sel" data-d="normal">Normal</button><button class="diff-btn" data-d="easy">Easy</button><button class="diff-btn" data-d="hard">Hard</button></div>
    <div class="tabs"><button class="tab sel" data-t="skins">馃悏</button><button class="tab" data-t="items">馃帓</button></div>
    <div class="shop-grid" id="shopGrid"></div>
    <button class="btn b-play" onclick="gameStart()" data-t="play"></button>
    <button class="btn b-unlock" id="proBtn" onclick="showUnlock()">馃拵</button>
  </div>
  <div class="screen" id="s2">
    <div>馃悏馃挜</div>
    <div class="big" id="goScore">0</div>
    <div class="go-sub" id="goSub1"></div>
    <div class="go-sub" id="goSub2"></div>
    <div class="badges" id="goBadges"></div>
    <button class="btn b-play b-sm" onclick="gameRestart()">馃攧</button>
    <button class="btn b-ghost b-sm" onclick="gameHome()">馃彔</button>
  </div>
</div>
<div class="swipe-hint" id="hint">鈼€ 婊戝姩鍒囨崲杞﹂亾 鈻?/div>
<script>
// ============================================================
//  SKY DRAGON RIDER 鈥?3-Lane Racing Game
// ============================================================
const C=document.getElementById('gc'),X=C.getContext('2d');
let W,H;

function rz(){W=window.innerWidth;H=window.innerHeight;document.getElementById('gc').width=W;document.getElementById('gc').height=H;}
window.addEventListener('resize',rz);rz();

// ---- i18n ----
let lang='zh';
const T={
  zh:{sub:'涓夎溅閬撹翰閬跨珵閫?路 Boss鎴?路 鐨偆閬撳叿',play:'鈻?寮€濮嬫父鎴?,overSub1:'鏈€楂樺垎',overSub2:'杩炲嚮',coinAdd:'+{} 閲戝竵 路 绱 {}'},
  en:{sub:'3-Lane Racing 路 Boss Fights 路 Skins',play:'鈻?Play',overSub1:'Best',overSub2:'Combo',coinAdd:'+{} Coins 路 Total {}'}
};
function tk(k,...a){let s=(T[lang]&&T[lang][k])||(T.en[k]||k);a.forEach((v,i)=>{s=s.replace('{'+i+'}',v)});return s;}
function applyLang(){document.querySelectorAll('[data-t]').forEach(el=>{const k=el.dataset.t;el.textContent=(T[lang]&&T[lang][k])||(T.en[k]||k);});updateShop();}
function toggleLang(){lang=lang==='zh'?'en':'zh';document.getElementById('langBtn').textContent=lang==='zh'?'馃寪 EN':'馃寪 涓?;applyLang();}

// ---- Audio ----
let ac=null;
function ab(f,d=.07,v=.1,ty='square'){
  if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return}
  const o=ac.createOscillator(),g=ac.createGain();o.type=ty;o.frequency.value=f;
  g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);
}
function sCoin(){ab(880,.04,.08);setTimeout(()=>ab(1320,.04,.08),35)}
function sHit(){ab(80,.12,.18,'sawtooth')}
function sPower(){ab(440,.04,.1,'triangle');ab(660,.04,.1,'triangle');ab(880,.05,.14,'triangle')}
function sBoss(){ab(45,.3,.25,'sawtooth')}

// ---- Save ----
const UK='DRAGON_PRO_2026';let isPro=false,totalCoins=0,bestScore=0,owned=[];
function ld(){try{bestScore=parseInt(localStorage.getItem('dr4_best')||'0');
  totalCoins=parseInt(localStorage.getItem('dr4_coins')||'0');
  owned=(localStorage.getItem('dr4_owned')||'').split(',').filter(Boolean);
  isPro=localStorage.getItem('dr4_pro')==='1'}catch(e){}
  if(!owned.length)owned.push('red');}
function sv(){try{localStorage.setItem('dr4_best',bestScore);localStorage.setItem('dr4_coins',totalCoins);
  localStorage.setItem('dr4_owned',owned.join(','));localStorage.setItem('dr4_pro',isPro?'1':'0')}catch(e){}}
ld();

// ---- Config ----
const SK=[{id:'red',name:'Flame',emoji:'馃悏',c:'#FF6B35',wc:'#FF9E55',cost:0},
  {id:'ice',name:'Frost',emoji:'馃惒',c:'#5B9EFF',wc:'#90C8FF',cost:200},
  {id:'gold',name:'Gold',emoji:'馃',c:'#F3B33D',wc:'#F5C060',cost:500},
  {id:'void',name:'Void',emoji:'馃',c:'#8B5CF6',wc:'#B490FF',cost:800}];
const IT=[{id:'shield2',name:'Shield',emoji:'馃洝锔?,cost:50,desc:'10s'},
  {id:'magnet2',name:'Magnet',emoji:'馃Р',cost:80,desc:'10s'},
  {id:'headstart',name:'Boost',emoji:'馃殌',cost:120,desc:'Start'}];
let activeSkin='red',shopItem=null,shopTab='skins',diff='normal';

const DF={
  easy:{spd:2.5,acc:.003,oR:.015,cR:.04,eR:.004,bS:400},
  normal:{spd:4,acc:.006,oR:.025,cR:.055,eR:.01,bS:280},
  hard:{spd:6,acc:.01,oR:.038,cR:.07,eR:.018,bS:180},
};

// ---- Game State ----
const ST={MENU:0,PLAY:1,OVER:2};let st=ST.MENU;
let fr=0,scr=0,combo=0,mxCombo=0,cns=0,spd=0;
let bActive=false,bHP=0,bMax=0,shakeT=0,flashA=0;

// Player: lane 0=left, 1=center, 2=right
const P={lane:1,tx:0,ty:0,sh:0,mg:0,bs:0,iv:0};
let laneObs=[],cnList=[],pwList=[],birds=[],bShots=[],prts=[];
let roadY=0,roadSpeed=0;

// ---- Layout (computed each frame in rzStyle) ----
let lx=[0,0,0],ly,lw,lh,carW,carH;
function rzStyle(){
  ly=H*.55;lw=W*.18;lh=H*.4;
  const cx=W/2,gap=lw*1.45;
  lx=[cx-gap,cx,cx+gap];
  carW=lw*.85;carH=carW*1.3;
}

function rst(){
  scr=0;combo=0;mxCombo=0;cns=0;spd=0;fr=0;bActive=false;bHP=0;bShots=[];
  P.lane=1;P.sh=0;P.mg=0;P.bs=0;P.iv=0;
  laneObs=[];cnList=[];pwList=[];birds=[];prts=[];
  roadY=0;roadSpeed=0;rzStyle();
}

// ---- Particles ----
function addP(x,y,n,c,sp=3,lf=20){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2;
    prts.push({x,y,vx:Math.cos(a)*sp*(.4+Math.random()),vy:Math.sin(a)*sp*(.4+Math.random()),lf,mlf:lf,c,r:1+Math.random()*2});
  }
}
function upP(){prts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.lf--;if(p.lf<=0)p.dead=true});prts=prts.filter(p=>!p.dead)}
function drP(){prts.forEach(p=>{X.globalAlpha=p.lf/p.mlf*.6;X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill()});X.globalAlpha=1}

// ---- Road drawing ----
function drawRoad(){
  // Road surface
  const rw=lw*4.5,rx=W/2-rw/2;
  X.fillStyle='#1f2937';X.fillRect(rx,ly,rw,lh);
  // Lane lines
  X.strokeStyle='rgba(255,255,255,.08)';X.lineWidth=2;X.setLineDash([20,15]);
  for(let i=1;i<3;i++){const lx2=rx+i*(rw/3);X.beginPath();X.moveTo(lx2,ly);X.lineTo(lx2,ly+lh);X.stroke()}
  X.setLineDash([]);
  // Edge lines
  X.strokeStyle='rgba(255,255,255,.3)';X.lineWidth=3;
  X.beginPath();X.moveTo(rx,ly);X.lineTo(rx,ly+lh);X.stroke();
  X.beginPath();X.moveTo(rx+rw,ly);X.lineTo(rx+rw,ly+lh);X.stroke();
  // Road stripes (moving)
  roadY=(roadY+roadSpeed)%40;
  X.fillStyle='rgba(255,255,255,.15)';
  for(let y=ly-roadY;y<ly+lh;y+=40){
    X.fillRect(rx+rw/3-15,y+(roadSpeed*.3),30,10);
    X.fillRect(rx+2*rw/3-15,y+(roadSpeed*.5),30,10);
    X.fillRect(rx+rw/3-15,y+20+(roadSpeed*.7),30,10);
    X.fillRect(rx+2*rw/3-15,y+20+(roadSpeed*.4),30,10);
  }
  // Side decoration
  X.fillStyle='#374151';
  X.fillRect(rx-4,ly,4,lh);X.fillRect(rx+rw,ly,4,lh);
  // Border highlights
  X.fillStyle='rgba(99,102,241,.3)';X.fillRect(rx,ly,rw,1);X.fillRect(rx,ly+lh,rw,1);
}

// ---- Obstacles (on lanes) ----
function spObs(){
  if(Math.random()<DF[diff].oR){
    const ln=Math.floor(Math.random()*3);
    laneObs.push({ln,y:ly-50,w:lw*.7,h:lw*.7,ct:false,ty:Math.random()<.2?'rock':'barrel'});
  }
}
function upObs(){
  const s=DF[diff].spd+spd;
  laneObs.forEach(o=>{o.y+=s;
    if(!o.ct&&o.y>ly+lh*.7){o.ct=true;scr++;combo=0}
    if(o.y>ly+lh-30&&o.ln===P.lane){
      if(P.iv>0){addP(lx[o.ln],o.y,6,'#F3B33D',2,10);o.y=ly+lh+50;return}
      if(P.sh>0){P.sh=0;addP(lx[o.ln],o.y,8,'#6EA8FE',3,14);sHit();o.y=ly+lh+50;return}
      gameHit();return;
    }
  });laneObs=laneObs.filter(o=>o.y<ly+lh+60);
}
function drObs(){
  laneObs.forEach(o=>{
    if(o.y<ly||o.y>ly+lh)return;
    const x=lx[o.ln];
    if(o.ty==='rock'){
      X.fillStyle='#6B7280';X.beginPath();X.moveTo(x-o.w/2,o.y+o.h/2);X.lineTo(x-o.w/3,o.y-o.h/2);X.lineTo(x+o.w/3,o.y-o.h/2);X.lineTo(x+o.w/2,o.y+o.h/2);X.closePath();X.fill();
      X.fillStyle='#4B5563';X.beginPath();X.moveTo(x-o.w*.15,o.y-o.h*.2);X.lineTo(x+o.w*.15,o.y-o.h*.2);X.lineTo(x+o.w*.25,o.y+o.h*.2);X.lineTo(x-o.w*.25,o.y+o.h*.2);X.closePath();X.fill();
    }else{
      X.fillStyle='#DC2626';rR(x-o.w/2,o.y-o.h/2,o.w,o.h,4);
      X.strokeStyle='#991B1B';X.lineWidth=2;X.beginPath();X.moveTo(x-o.w/2,o.y-o.h/2+5);X.lineTo(x+o.w/2,o.y-o.h/2+5);X.stroke();
      X.beginPath();X.moveTo(x-o.w/2,o.y+o.h/2-5);X.lineTo(x+o.w/2,o.y+o.h/2-5);X.stroke();
    }
  });
}

// ---- Flying Birds (cross lane) ----
function spBird(){
  if(Math.random()<DF[diff].eR){
    const rx=W/2-(lw*4.5)/2;
    birds.push({x:Math.random()<.5?rx-30:W-rx+30,y:ly+Math.random()*lh*.6,r:14,vx:Math.random()<.5?1.5:-1.5,fl:Math.random()*Math.PI*2,dead:false});
  }
}
function upBird(){
  birds.forEach(b=>{b.x+=b.vx;b.y+=DF[diff].spd+spd*.6;b.fl+=.14;
    if(b.y>ly+lh+40)b.dead=true;
    // collision
    const dx=Math.abs(lx[P.lane]-b.x),dy=Math.abs(ly+lh-carH/2-b.y);
    if(dx<carW/2+b.r&&dy<carH/2+b.r){
      if(P.iv>0){b.dead=true;addP(b.x,b.y,5,'#F3B33D',2,10)}
      else if(P.sh>0){P.sh=0;b.dead=true;sHit();addP(lx[P.lane],ly+lh-carH/2,6,'#6EA8FE',3,12)}
      else{gameHit();return}
    }
    // Bounds
    const rx=W/2-(lw*4.5)/2;
    if(b.x<rx-60||b.x>W-rx+60)b.dead=true;
  });birds=birds.filter(b=>!b.dead);
}
function drBird(){
  birds.forEach(b=>{
    if(b.y<ly-30||b.y>ly+lh+30)return;
    X.save();X.translate(b.x,b.y);X.rotate(Math.sin(b.fl)*.2);
    X.fillStyle='#EF4444';X.beginPath();X.ellipse(0,0,b.r*1.2,b.r*.7,0,0,Math.PI*2);X.fill();
    X.fillStyle='#FBBF24';X.beginPath();X.moveTo(b.r,0);X.lineTo(b.r*1.4,-b.r*.22);X.lineTo(b.r*1.4,b.r*.22);X.fill();
    X.fillStyle='#fff';X.beginPath();X.arc(b.r*.4,-b.r*.25,b.r*.22,0,Math.PI*2);X.fill();
    X.fillStyle='#111';X.beginPath();X.arc(b.r*.45,-b.r*.25,b.r*.1,0,Math.PI*2);X.fill();
    X.restore();
  });
}

// ---- Coins (on lanes) ----
function spCoin(){if(Math.random()<(DF[diff].cR*(isPro?1.3:1))){cnList.push({ln:Math.floor(Math.random()*3),y:ly-30,r:7,sp:Math.random()*Math.PI*2,dead:false});}}
function upCoin(){
  const s=DF[diff].spd+spd,mgR=P.mg>0?100:0;
  cnList.forEach(c=>{c.y+=s;c.sp+=.08;
    if(c.y>ly&&c.y<ly+lh&&c.ln===P.lane){c.dead=true;combo++;cns++;mxCombo=Math.max(mxCombo,combo);totalCoins++;sCoin();addP(lx[P.lane],c.y,4,'#F3B33D',2,10)}
    if(c.y>ly+lh+20)c.dead=true;
    // magnet
    if(mgR>0&&c.ln!==P.lane&&c.y>ly&&c.y<ly+lh){if(Math.abs(c.ln-P.lane)===1&&Math.abs(lx[P.lane]-lx[c.ln])<mgR){c.ln=P.lane}}
  });cnList=cnList.filter(c=>!c.dead);
}
function drCoin(){
  cnList.forEach(c=>{
    if(c.y<ly-10||c.y>ly+lh+10)return;
    const x=lx[c.ln],a=.4+.4*Math.sin(c.sp);
    X.globalAlpha=a*.3;X.fillStyle='#F3B33D';X.beginPath();X.arc(x,c.y,c.r+2,0,Math.PI*2);X.fill();X.globalAlpha=1;
    const g2=X.createRadialGradient(x-1,c.y-1,0,x,c.y,c.r);g2.addColorStop(0,'#F3B33D');g2.addColorStop(1,'#B8860B');
    X.fillStyle=g2;X.beginPath();X.arc(x,c.y,c.r,0,Math.PI*2);X.fill();
    X.fillStyle='#8B6914';X.font='bold 8px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('楼',x,c.y+.5);
  });
}

// ---- Powerups ----
function spPower(){if(Math.random()<.004){const t=[{id:'shield',e:'馃洝锔?,cc:'#6EA8FE'},{id:'magnet',e:'馃Р',cc:'#F4728E'},{id:'boost',e:'鈿?,cc:'#F3B33D'}];pwList.push({...t[Math.floor(Math.random()*t.length)],ln:Math.floor(Math.random()*3),y:ly-30,r:11,t:0,dead:false})}}
function upPower(){
  pwList.forEach(p=>{p.y+=DF[diff].spd+spd;p.t+=.06;
    if(p.y>ly&&p.y<ly+lh&&p.ln===P.lane){p.dead=true;if(p.id==='shield')P.sh=420;else if(p.id==='magnet')P.mg=420;else P.bs=280;sPower();addP(lx[P.lane],p.y,6,p.cc,3,12)}
    if(p.y>ly+lh+20)p.dead=true;
  });pwList=pwList.filter(p=>!p.dead);
}
function drPower(){
  pwList.forEach(p=>{
    if(p.y<ly-10||p.y>ly+lh+10)return;const x=lx[p.ln];
    const a=.35+.25*Math.sin(p.t*3);X.globalAlpha=.2+.2*a;X.fillStyle=p.cc;X.beginPath();X.arc(x,p.y,p.r+3,0,Math.PI*2);X.fill();
    X.globalAlpha=1;X.beginPath();X.arc(x,p.y,p.r,0,Math.PI*2);X.fillStyle=p.cc;X.fill();
    X.font='12px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText(p.e,x,p.y);
  });X.globalAlpha=1;
}

// ---- Boss ----
function spBoss(){
  const d=DF[diff];
  if(!bActive&&scr>0&&scr>=d.bS&&scr%Math.round(d.bS)===0){
    bActive=true;bHP=20+(Math.floor(scr/d.bS)-1)*8;if(isPro)bHP=Math.floor(bHP*.6);bMax=bHP;sBoss();addP(W/2,ly+30,30,'#F44',6,25);
  }
}
function upBoss(){
  if(!bActive)return;
  const bx=W/2+Math.sin(fr*.02)*60,by=ly+70+Math.cos(fr*.03)*30;
  if(fr%20===0&&bHP>bMax*.25)bShots.push({x:bx,y:by,dx:-2.5,dy:2,r:4,lf:100});
  if(fr%40===0&&bHP>bMax*.5){bShots.push({x:bx,y:by,dx:-2,dy:-2,r:4,lf:80});bShots.push({x:bx,y:by,dx:2,dy:-2,r:4,lf:80})}
  bShots.forEach(s=>{s.x+=s.dx;s.y+=s.dy;s.lf--;
    const ppx=lx[P.lane],ppy=ly+lh-carH/2;
    if(Math.sqrt((ppx-s.x)**2+(ppy-s.y)**2)<carW/2+5){s.dead=true;
      if(P.iv>0)return;if(P.sh>0){P.sh=0;sHit()}else gameHit();return;}
    if(s.lf<=0||s.y>ly+lh+30)s.dead=true;
  });bShots=bShots.filter(s=>!s.dead);
  if(fr%3===0){bHP--;addP(bx+Math.random()*20-10,by+Math.random()*20-10,1,'#F3B33D',1.5,8)}
  if(bHP<=0){bActive=false;bShots=[];sBoss();addP(bx,by,40,'#F3B33D',7,35);scr+=12;combo+=3;cns+=3}
}
function drBoss(){
  if(!bActive)return;
  const bx=W/2+Math.sin(fr*.02)*60,by=ly+70+Math.cos(fr*.03)*30,bs=38;
  X.save();X.translate(bx,by);
  X.globalAlpha=.12+.1*Math.sin(fr*.07);X.fillStyle='#F44';X.beginPath();X.arc(0,0,bs+7,0,Math.PI*2);X.fill();X.globalAlpha=1;
  const g=X.createRadialGradient(0,0,0,0,0,bs);g.addColorStop(0,'#F3B33D');g.addColorStop(.5,'#F44');g.addColorStop(1,'#6B0000');
  X.fillStyle=g;X.beginPath();X.arc(0,0,bs,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';X.beginPath();X.arc(-bs*.25,-bs*.2,bs*.16,0,Math.PI*2);X.fill();X.beginPath();X.arc(bs*.25,-bs*.2,bs*.16,0,Math.PI*2);X.fill();
  X.fillStyle='#111';X.beginPath();X.arc(-bs*.25,-bs*.2,bs*.08,0,Math.PI*2);X.fill();X.beginPath();X.arc(bs*.25,-bs*.2,bs*.08,0,Math.PI*2);X.fill();
  X.strokeStyle='#F3B33D';X.lineWidth=2;X.beginPath();X.arc(0,bs*.07,bs*.2,0,Math.PI);X.stroke();X.restore();
  // HP bar
  const hw=150,hh=4;
  X.fillStyle='rgba(0,0,0,.4)';rR(W/2-hw/2-2,ly-10,hw+4,hh+4,2);
  X.fillStyle='#333';rR(W/2-hw/2,ly-10,hw,hh,2);
  X.fillStyle='#F44';rR(W/2-hw/2,ly-10,hw*(bHP/bMax),hh,2);
  X.fillStyle='#fff';X.font='bold 8px sans-serif';X.textAlign='center';X.fillText('BOSS',W/2,ly-15);
  bShots.forEach(s=>{X.fillStyle='#F44';X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.fill();X.fillStyle='#F3B33D';X.beginPath();X.arc(s.x,s.y,s.r*.5,0,Math.PI*2);X.fill()});
}

// ---- Player Car/Dragon ----
function drawPlayer(){
  rzStyle();
  const x=lx[P.lane],y=ly+lh-carH*.7;
  // Smooth lane transition
  P.tx+=(x-P.tx)*.35;P.ty+=(y-P.ty)*.35;
  const px=P.tx||x,py=P.ty||y;
  const sk=SK.find(s=>s.id===activeSkin)||SK[0];

  X.save();X.translate(px,py);

  // Shadow
  X.fillStyle='rgba(0,0,0,.35)';X.beginPath();X.ellipse(0,carH*.3,carW*.55,carH*.08,0,0,Math.PI*2);X.fill();

  // Car body
  const cg=X.createLinearGradient(0,-carH/2,0,carH/2);
  cg.addColorStop(0,sk.wc);cg.addColorStop(.4,sk.c);cg.addColorStop(1,sk.c);
  X.fillStyle=cg;
  rR(-carW/2,-carH/2,carW,carH,carW*.25);

  // Windshield
  X.fillStyle='rgba(200,220,255,.5)';
  X.beginPath();X.moveTo(-carW*.3,-carH*.2);X.lineTo(-carW*.1,-carH*.42);X.lineTo(carW*.1,-carH*.42);X.lineTo(carW*.3,-carH*.2);X.closePath();X.fill();
  // Dragon head ornament
  X.fillStyle='#F3B33D';X.beginPath();X.moveTo(0,-carH*.5);X.lineTo(-carW*.12,-carH*.3);X.lineTo(carW*.12,-carH*.3);X.closePath();X.fill();
  // Eyes as headlights
  X.fillStyle='#FFE';X.beginPath();X.arc(-carW*.22,-carH*.08,carW*.12,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(carW*.22,-carH*.08,carW*.12,0,Math.PI*2);X.fill();
  X.fillStyle='#F3B33D';X.beginPath();X.arc(-carW*.22,-carH*.08,carW*.06,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(carW*.22,-carH*.08,carW*.06,0,Math.PI*2);X.fill();
  // Wheels
  X.fillStyle='#1F2937';rR(-carW*.48,carH*.25,carW*.22,carH*.14,3);
  rR(+carW*.26,carH*.25,carW*.22,carH*.14,3);
  // Rear flame
  const fh=carH*.12+Math.sin(fr*.3)*carH*.04;
  X.fillStyle='#EF4444';X.beginPath();X.moveTo(-carW*.2,carH/2);X.lineTo(0,carH/2+fh);X.lineTo(carW*.2,carH/2);X.fill();
  X.fillStyle='#F3B33D';X.beginPath();X.moveTo(-carW*.1,carH/2);X.lineTo(0,carH/2+fh*.6);X.lineTo(carW*.1,carH/2);X.fill();

  X.restore();

  // Aura
  if(P.sh>0||P.iv>0){
    X.globalAlpha=.16+.1*Math.sin(fr*.15);X.fillStyle=P.iv>0?'#F3B33D':'#6EA8FE';
    X.beginPath();X.arc(px,py,carW*.7,0,Math.PI*2);X.fill();X.globalAlpha=1;
  }
}

// ---- Background/Sky ----
let stars=[],clouds=[];
function initBg(){
  stars=[];for(let i=0;i<35;i++)stars.push({x:Math.random()*W,y:Math.random()*ly,r:.3+Math.random()*.9,p:Math.random()*Math.PI*2});
  clouds=[];for(let i=0;i<5;i++)clouds.push({x:Math.random()*W,y:Math.random()*(ly*.8),r:15+Math.random()*30,sp:.2+Math.random()*.8,al:.02+Math.random()*.05});
}
initBg();
function drawBg(){
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0F172A');g.addColorStop(.4,'#1E1B4B');g.addColorStop(.7,'#1E293B');g.addColorStop(1,'#1A202C');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  stars.forEach(s=>{s.p+=.01;X.globalAlpha=.18+.28*Math.sin(s.p);X.fillStyle='#fff';X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.fill()});X.globalAlpha=1;
  const ss=st===ST.PLAY?(DF[diff].spd+spd)*.1:0;
  clouds.forEach(cl=>{cl.x-=cl.sp+ss;if(cl.x<-80){cl.x=W+80;cl.y=Math.random()*(ly*.8)};X.globalAlpha=cl.al;X.fillStyle='#94A3B8';X.beginPath();X.arc(cl.x,cl.y,cl.r,0,Math.PI*2);X.fill();X.beginPath();X.arc(cl.x+cl.r*.4,cl.y-cl.r*.1,cl.r*.5,0,Math.PI*2);X.fill();X.globalAlpha=1});
  // Trees/buildings in background (parallax)
  const rx=W/2-(lw*2.5);
  for(let i=0;i<12;i++){
    const tx=rx+i*(W/10)+((fr*(ss*.3))% (W/10)),bh=30+Math.random()*25;
    X.fillStyle='rgba(30,41,59,.6)';X.fillRect(tx,ly-bh,W/24,bh);
  }
}

// ---- HUD ----
function drawHUD(){
  X.fillStyle='#fff';X.font='bold 16px sans-serif';X.textAlign='left';X.textBaseline='top';
  X.fillText(scr,10,34);
  if(combo>1){X.fillStyle='#F3B33D';X.font='bold 12px sans-serif';X.fillText('x'+combo,10,50);}
  X.fillStyle='#F3B33D';X.font='10px sans-serif';X.fillText('楼'+cns,10,50+(combo>1?14:0));
  X.textAlign='right';
  X.fillStyle='rgba(255,255,255,.25)';X.font='9px sans-serif';X.fillText('BEST:'+bestScore,W-10,34);
  let py=46;
  if(P.sh>0){X.fillStyle='#6EA8FE';X.font='9px sans-serif';X.fillText('馃洝'+Math.ceil(P.sh/60)+'s',W-10,py);py+=12;}
  if(P.mg>0){X.fillStyle='#F4728E';X.fillText('馃Р'+Math.ceil(P.mg/60)+'s',W-10,py);py+=12;}
  if(P.bs>0){X.fillStyle='#F3B33D';X.fillText('鈿?+Math.ceil(P.bs/60)+'s',W-10,py);py+=12;}
  // Speed bar
  const bw=50,bh=3,bx=W-10-bw;py+=4;
  X.fillStyle='rgba(255,255,255,.1)';rR(bx,py,bw,bh,1.5);
  X.fillStyle='#F4728E';rR(bx,py,bw*Math.min(spd/8,1),bh,1.5);
}

// ---- Utils ----
function rR(x,y,w,h,r){if(w<=0||h<=0)return;
  X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();X.fill();
}

// ---- Game ----
function gameStart(){
  rst();st=ST.PLAY;rzStyle();
  P.tx=lx[1];P.ty=ly+lh-carH*.7;
  if(shopItem){const it=IT.find(i=>i.id===shopItem);if(it){if(it.id==='shield2')P.sh=600;else if(it.id==='magnet2')P.mg=600;else if(it.id==='headstart'){P.bs=140;P.iv=70};totalCoins-=it.cost;sv();shopItem=null}}
  if(isPro&&P.sh<140)P.sh=140;
  document.getElementById('s1').classList.remove('on');
  document.getElementById('s2').classList.remove('on');
  document.getElementById('hint').style.display='block';
  try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
}
function gameHit(){sHit();shakeT=6;flashA=.4;st=ST.OVER;if(scr>bestScore){bestScore=scr;sv()}sv();
  document.getElementById('goScore').textContent=scr;
  document.getElementById('goSub1').textContent=tk('overSub1')+': '+bestScore;
  document.getElementById('goSub2').textContent=tk('overSub2')+': x'+mxCombo+'  '+tk('coinAdd',cns,totalCoins);
  let bs='';if(scr>=100)bs+='<span class="badge bg-g">馃憫 Legend</span>';if(scr>=50)bs+='<span class="badge bg-s">猸?Ace</span>';if(scr>=30)bs+='<span class="badge bg-b">馃弲 Star</span>';if(mxCombo>=20)bs+='<span class="badge bg-p">馃敟 Combo</span>';if(cns>=15)bs+='<span class="badge bg-b">馃挵 Rich</span>';
  document.getElementById('goBadges').innerHTML=bs;document.getElementById('s2').classList.add('on');
  document.getElementById('hint').style.display='none';refreshUI();
}
function gameRestart(){gameStart();}
function gameHome(){st=ST.MENU;initBg();document.getElementById('s1').classList.add('on');document.getElementById('s2').classList.remove('on');document.getElementById('hint').style.display='none';refreshUI();}

// ---- Update ----
function update(){
  if(st!==ST.PLAY)return;fr++;
  const d=DF[diff];spd=Math.min(spd+d.acc,isPro?8:9.5);
  roadSpeed=(d.spd+spd)*.8;
  if(P.bs>0){spd+=.2;roadSpeed*=1.3}
  if(P.sh>0)P.sh--;if(P.mg>0)P.mg--;if(P.bs>0)P.bs--;if(P.iv>0)P.iv--;
  spObs();upObs();spBird();upBird();spCoin();upCoin();spPower();upPower();spBoss();upBoss();upP();
  if(scr>0&&fr%60===0)spd=Math.min(spd+.1,isPro?8:9.5);
}

// ---- Draw ----
function draw(){
  X.save();
  X.clearRect(0,0,W,H);
  drawBg();
  if(st>=ST.PLAY){rzStyle();drawRoad();drObs();drBird();drCoin();drPower();drBoss();drawPlayer();drP();drawHUD();}
  if(shakeT>0){shakeT--;X.translate((Math.random()-.5)*shakeT,(Math.random()-.5)*shakeT)}
  if(flashA>0){X.globalAlpha=flashA;X.fillStyle='#F44';X.fillRect(0,0,W,H);flashA-=.03;X.globalAlpha=1}
  X.restore();
}

// ---- Input ----
let swipeX0=0,swipeY0=0;
document.addEventListener('touchstart',e=>{
  if(st!==ST.PLAY)return;e.preventDefault();
  swipeX0=e.touches[0].clientX;swipeY0=e.touches[0].clientY;
},{passive:false});
document.addEventListener('touchend',e=>{
  if(st!==ST.PLAY)return;
  const dx=(e.changedTouches[0]||touches[0]).clientX-swipeX0;
  const dy=(e.changedTouches[0]||touches[0]).clientY-swipeY0;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20){P.lane=Math.max(0,Math.min(2,P.lane+(dx>0?1:-1)));if(navigator.vibrate)navigator.vibrate(5)}
  else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>20){P.lane=Math.max(0,Math.min(2,P.lane+(dy>0?1:-1)));if(navigator.vibrate)navigator.vibrate(5)}
});
document.addEventListener('keydown',e=>{
  if(st!==ST.PLAY)return;
  if(e.code==='ArrowLeft'){e.preventDefault();P.lane=Math.max(0,P.lane-1)}
  if(e.code==='ArrowRight'){e.preventDefault();P.lane=Math.min(2,P.lane+1)}
});
// Tap to switch
document.addEventListener('click',e=>{
  if(st!==ST.PLAY)return;
  const mid=W/3;if(e.clientX<mid*1.2)P.lane=Math.max(0,P.lane-1);else P.lane=Math.min(2,P.lane+1);
  if(navigator.vibrate)navigator.vibrate(5);
});

// ---- Shop ----
function refreshUI(){
  document.getElementById('bestDisp').textContent=bestScore;
  document.getElementById('coinDisp').textContent=totalCoins;
  document.getElementById('lvlDisp').textContent=Math.floor(Math.sqrt(totalCoins/6))+1;
  updateShop();
}
function updateShop(){
  const g=document.getElementById('shopGrid');
  if(shopTab==='skins'){
    g.innerHTML=SK.map(s=>{const o=owned.includes(s.id)||isPro;const can=totalCoins>=s.cost&&!o;
      return '<div class="shop-it'+ (o?' owned':'')+'" onclick="'+ (can?"buySkin('"+s.id+"')":o?(activeSkin===s.id?'':"eqSkin('"+s.id+"')"):'') +'"><div class="si">'+s.emoji+'</div><div class="sn">'+s.name+'</div><div class="sc">'+(o?(activeSkin===s.id?'鉁?Active':'鉁?Owned'):'楼'+s.cost)+'</div></div>';
    }).join('');
  }else{
    g.innerHTML=IT.map(it=>{const can=totalCoins>=it.cost&&shopItem!==it.id;
      return '<div class="shop-it'+ (shopItem===it.id?' owned':'')+'" onclick="'+ (can||shopItem===it.id?"buyItem('"+it.id+"')":'') +'"><div class="si">'+it.emoji+'</div><div class="sn">'+it.name+'<br><small style="color:#666;font-size:8px">'+it.desc+'</small></div><div class="sc">'+(shopItem===it.id?'鉁?Equipped':'楼'+it.cost)+'</div></div>';
    }).join('');
  }
}
window.buySkin=function(id){if(!owned.includes(id)&&!isPro){owned.push(id);totalCoins-=SK.find(s=>s.id===id).cost;sv()}activeSkin=id;updateShop();refreshUI()};
window.eqSkin=function(id){activeSkin=id;updateShop()};
window.buyItem=function(id){if(shopItem===id)shopItem=null;else shopItem=id;updateShop();refreshUI()};

document.querySelectorAll('.tab').forEach(tb=>tb.onclick=function(){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('sel'));this.classList.add('sel');shopTab=this.dataset.t;updateShop();
});
document.querySelectorAll('.diff-btn').forEach(b=>b.onclick=function(){
  document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('sel'));this.classList.add('sel');diff=this.dataset.d;
});

// ---- Pro Unlock ----
function showUnlock(){if(!isPro)document.getElementById('md')?.classList.add('show')}
function closeModal(){document.getElementById('md')?.classList.remove('show')}
function doUnlock(){
  // Simple: just enter the code
  const inp=prompt(lang==='zh'?'璇疯緭鍏ヨВ閿佸彛浠?:'Enter unlock code');
  if(inp&&inp.trim().toUpperCase()===UK){isPro=true;sv();owned=[...SK.map(s=>s.id)];sv();refreshUI();alert('鉁?Pro Unlocked!')}
  else if(inp)alert(lang==='zh'?'鍙ｄ护閿欒':'Wrong code!')
}
window.zQR=function(){} // no QR for now

refreshUI();
if(isPro){owned=[...SK.map(s=>s.id)];sv();refreshUI()}

(function loop(){rz();update();draw();requestAnimationFrame(loop)})();
</script>
