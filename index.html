<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>йҰғжӮҸ жӨӢзӮІгҒүзҒҸеҝӣз·іжқһ?/title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0E3B;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI','PingFang SC',sans-serif}
canvas{display:block;margin:0 auto}
#ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#ui>*{pointer-events:auto}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px;max-width:380px;width:90%}
.screen.active{display:flex}
h1{font-size:42px;background:linear-gradient(135deg,#FFD700,#FF6B35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:0 0 40px rgba(255,165,0,.3);margin-bottom:4px}
.subtitle{color:#A8C0FF;font-size:14px;margin-bottom:8px}
.btn{padding:14px 44px;border:none;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px}
.btn:active{transform:scale(.95)}
.btn-play{background:linear-gradient(135deg,#FF6B35,#FF2D78);color:#fff;box-shadow:0 6px 30px rgba(255,45,120,.4)}
.btn-play:hover{box-shadow:0 8px 40px rgba(255,45,120,.6)}
.btn-small{padding:10px 28px;font-size:15px;border-radius:40px}
.btn-ghost{background:rgba(255,255,255,.1);color:#A8C0FF;border:1.5px solid rgba(255,255,255,.2)}
.stats{display:flex;gap:20px;margin:12px 0}
.stat{text-align:center}
.stat-val{font-size:32px;font-weight:800;color:#FFD700}
.stat-label{font-size:11px;color:#6688BB;margin-top:2px}
.feature-list{text-align:left;color:#CCDDFF;font-size:13px;line-height:2}
.feature-list span{margin-right:6px;font-size:16px}
#gameOverScreen .final-score{font-size:64px;font-weight:900;color:#FFD700;text-shadow:0 0 30px rgba(255,215,0,.5)}
#gameOverScreen .best{color:#A8C0FF;font-size:14px;margin-top:-8px}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;margin:4px}
.badge-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#1a0a00}
.badge-silver{background:linear-gradient(135deg,#C0C0C0,#E8E8E8);color:#333}
.badge-bronze{background:linear-gradient(135deg,#CD7F32,#E8A060);color:#fff}
.tip{color:#6688AA;font-size:12px;margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- еҜ®вӮ¬жҝ®е¬¬жҷ«й—Ҳ?-->
<div id="ui">
  <div class="screen active" id="startScreen">
    <h1>йҰғжӮҸ жӨӢзӮІгҒүзҒҸеҝӣз·іжқһ?/h1>
    <div class="subtitle">йҚҳзҶ·еһұжөјжҲҰжЈҪжӨӢзӮ¶о”‘еЁ“е‘Ҡеһҷ и·Ҝ йҸғзҠІз®ҚйҚӣе©„еҮҪйҚ‘вӮ¬йҗ—?/div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="bestScore">0</div><div class="stat-label">йҸҲвӮ¬жҘӮжЁәеһҺ</div></div>
      <div class="stat"><div class="stat-val" id="totalCoins">0</div><div class="stat-label">з»ұоҲқо…ёй–ІжҲқз«ө</div></div>
    </div>
    <div class="feature-list">
      <span>йҰғе№ғ</span>йҗҗз‘°еҡ®/з‘ҷпёҪжҮңйҺәСғеҹ—жӨӢзӮ¶о”‘жҘӮжЁәе®і<br>
      <span>йҰғжҢө</span>йҸҖе •жіҰй–ІжҲқз«өз‘ҷпҪүж”ЈйҸӮжү®жҜҠй‘І?br>
      <span>йҰғејі</span>ж¶“еӨҢоқ’й—…жғ§е®іеҰҜвҖізҙЎйҺёжҲһеһ¬й‘·оҒ…еһң<br>
      <span>йҲҝ?/span>йҚ”зҠ»вӮ¬зҶјдәҫйҚҸ?& йҺ¶гӮҮжөҳй–¬ж’іеҸҝ
    </div>
    <button class="btn btn-play" onclick="Game.start('normal')" style="margin-top:8px">еҜ®вӮ¬жҝ®е¬«зҲ¶йҺҙ?/button>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-ghost btn-small" onclick="Game.start('easy')">з» вӮ¬йҚ—?/button>
      <button class="btn btn-ghost btn-small" onclick="Game.start('hard')">йҚҘдјҙжҜҰ</button>
    </div>
    <div class="tip">йҸҲо„ҒзҲ¶йҺҙеҝҺиҙҹ100%йҚҳзҶ·еһұеҜ®вӮ¬йҚҷжҲҜзҙқз‘ҷжҺ•еЈҠ/зјҮеәўж№і/жө пҪҮзҲңйҚ§еӣЁжЈӨз»—оғҝз¬ҒйҸӮеңӯеў—йҸүеҶЁе”ҙзҖ№?/div>
  </div>

  <!-- еЁ“е‘ҠеһҷзјҒж’ҙжҪ«йҗЈеІ„жҪ° -->
  <div class="screen" id="gameOverScreen">
    <div style="font-size:48px">йҰғжӮҸйҰғжҢ®</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="best" id="bestText">йҸҲвӮ¬жҘӮжЁәеһҺ: 0</div>
    <div id="badges" style="margin:8px 0"></div>
    <div style="color:#CCDDFF;font-size:14px;margin:4px 0" id="coinText">+0 й–ІжҲқз«ө</div>
    <button class="btn btn-play btn-small" onclick="Game.restart()" style="margin-top:4px">йҚҗе¶ҶжҪөж¶“вӮ¬зҒһвӮ¬</button>
    <button class="btn btn-ghost btn-small" onclick="Game.home()" style="margin-top:4px">жқ©ж–ҝжҙ–жЈЈж ӯгҖү</button>
  </div>
</div>

<script>
// ============================================================
//  жӨӢзӮІгҒүзҒҸеҝӣз·іжқһ?- 100% йҚҳзҶ·еһұHTML5еЁ“е‘Ҡеһҷ
//  йҗ—е ҹжҪҲжҫ№зүҲж§‘й”ӣж°ӯж№°еЁ“е‘ҠеһҷйҺөвӮ¬йҸҲеӨүе”¬йҗ®дҪөвӮ¬дҪәз·ЁйҸҲоҲҳвӮ¬дҫҖз…¶йҸҒе қжҪҺж¶“е“„её«йҚ’?//  йҸғзҠұжҚўжөЈжӣ оғҮж¶“еӨӢжҹҹIPйҠҶдҪёжҷўйҸҚеӣҘвӮ¬дҪәз·ЁйҸҲоҲңзӨҢйҸү?// ============================================================

const Canvas = document.getElementById('gameCanvas');
const C = Canvas.getContext('2d');

// ---- й‘·оҒҲвӮ¬еӮҡз°ІйҗўиҜІз«· ----
let W, H, SCALE;
function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  Canvas.width = W;
  Canvas.height = H;
  SCALE = Math.min(W/420, H/750, 1.8);
  Canvas.style.width = W+'px';
  Canvas.style.height = H+'px';
}
window.addEventListener('resize', resize);
resize();

// ---- еЁ“е‘ҠеһҷйҗҳиҲөвӮ¬?----
const STATE = { MENU:0, PLAYING:1, OVER:2 };
let state = STATE.MENU;
let score=0, coins=0, best=0, totalCoins=0, speed=0, difficulty='normal';
let frameCount=0, shakeTimer=0, flashAlpha=0;
let gameTime=0;

// ---- з’ҮиҜІеҪҮзҖӣжЁ»гҖӮ ----
try{
  best = parseInt(localStorage.getItem('dragon_rider_best')||'0');
  totalCoins = parseInt(localStorage.getItem('dragon_rider_coins')||'0');
}catch(e){}
function save(){try{localStorage.setItem('dragon_rider_best',best);localStorage.setItem('dragon_rider_coins',totalCoins)}catch(e){}}

// ---- й—…жғ§е®ій–°е¶Үз–Ҷ ----
const DIFF = {
  easy:   {speed:3.5, accel:0.005, gapMin:160, gapMax:240, obsRate:0.025, coinRate:0.04},
  normal: {speed:5.5, accel:0.008, gapMin:120, gapMax:200, obsRate:0.035, coinRate:0.05},
  hard:   {speed:7.5, accel:0.012, gapMin:90,  gapMax:160, obsRate:0.045, coinRate:0.06},
};

// ---- зҒҸеҝӣз·із‘ҷжҺ•еЈҠй”ӣе ўеҮҪCanvasзјҒжЁәеҹ—й”ӣеІ„жөӮжҫ¶ж ӯе„ҙз»ұзҠіжҪ—й”ӣ?---
const Dragon = {
  x:0, y:0, vy:0, w:52, h:40,
  flap:0, flapSpeed:0,
  shield:0, magnet:0, boost:0,
  invincible:0,
  trail:[],

  reset(){
    this.x = 90*SCALE;
    this.y = H/2;
    this.vy = 0;
    this.flap = 0;
    this.shield = 0;
    this.magnet = 0;
    this.boost = 0;
    this.invincible = 0;
    this.trail = [];
  },

  flapUp(){
    this.vy = -7*SCALE;
    this.flap = 8;
    if(navigator.vibrate) navigator.vibrate(15);
  },

  update(){
    // й–Іе¶…е§Ҹ
    this.vy += 0.45*SCALE;
    this.y += this.vy;
    // жқҲеңӯжҷ«
    if(this.y < 20) {this.y=20; this.vy=0;}
    if(this.y > H-20) {this.y=H-20; this.vy=0; if(state===STATE.PLAYING) Game.hit();}
    // йҚ”г„§ж•ҫ
    if(this.flap>0) this.flap--;
    // й–¬ж’іеҸҝйҚҠжҺ•о…ёйҸғ?    if(this.shield>0) this.shield--;
    if(this.magnet>0) this.magnet--;
    if(this.boost>0) this.boost--;
    if(this.invincible>0) this.invincible--;
    // зҒҸжҚҗжҠ—
    this.trail.unshift({x:this.x, y:this.y+Math.sin(frameCount*0.3)*4*SCALE});
    if(this.trail.length>12) this.trail.pop();
  },

  draw(){
    const x=this.x, y=this.y, s=SCALE;
    // йҺ¶гӮҮжөҳйҚҸеӨҢе№Ҷ
    if(this.shield>0 || this.invincible>0){
      C.globalAlpha = 0.25+0.15*Math.sin(frameCount*0.2);
      C.beginPath();C.arc(x, y, 38*s, 0, Math.PI*2);
      C.fillStyle = this.invincible>0 ? '#FFD700' : '#00D4FF';
      C.fill();
      C.globalAlpha = 1;
    }
    // зҒҸжҚҗжҠ—
    this.trail.forEach((p,i)=>{
      C.globalAlpha = (1-i/12)*0.25;
      C.beginPath();C.arc(p.x, p.y, (12-i)*s, 0, Math.PI*2);
      C.fillStyle = '#FF8C42';C.fill();
    });
    C.globalAlpha=1;

    C.save();
    C.translate(x, y);
    if(this.vy>3) C.rotate(0.15);
    if(this.vy<-3) C.rotate(-0.15);

    // йҹ¬оӮЎз¶Ӣ
    C.fillStyle = '#FF6B35';
    C.beginPath();
    C.ellipse(0, 0, 22*s, 14*s, 0, 0, Math.PI*2);
    C.fill();

    // й‘Іж°¬з“ҷ
    C.fillStyle = '#FFD4A8';
    C.beginPath();
    C.ellipse(2*s, 4*s, 14*s, 9*s, 0, 0, Math.PI*2);
    C.fill();

    // зјҲе‘°е”Ёй”ӣе ҹеў–йҚ”оҹ’зҙҡ
    const wingFlap = Math.sin(frameCount*0.4)*0.5;
    C.fillStyle = '#FF8C42';
    C.save();
    C.translate(-8*s, -6*s);
    C.rotate(-0.6+wingFlap);
    C.beginPath();
    C.ellipse(0, 0, 18*s, 8*s, 0, 0, Math.PI*2);
    C.fill();
    C.restore();
    C.save();
    C.translate(-8*s, 6*s);
    C.rotate(0.6-wingFlap);
    C.beginPath();
    C.ellipse(0, 0, 18*s, 8*s, 0, 0, Math.PI*2);
    C.fill();
    C.restore();

    // йҗӘиӮ©жҪ§
    C.fillStyle = '#fff';
    C.beginPath();C.arc(12*s, -5*s, 6*s, 0, Math.PI*2);C.fill();
    C.fillStyle = '#1a0a00';
    C.beginPath();C.arc(14*s, -5*s, 3*s, 0, Math.PI*2);C.fill();
    // жҘӮжЁәеҺң
    C.fillStyle='#fff';
    C.beginPath();C.arc(15*s,-6*s,1.2*s,0,Math.PI*2);C.fill();

    // йҚўжқ‘еҸҚ
    C.strokeStyle='#CC4400';C.lineWidth=1.5*s;
    C.beginPath();C.arc(16*s, -1*s, 5*s, 0.1*Math.PI, 0.9*Math.PI);C.stroke();

    // з‘ҷ?    C.fillStyle='#FFD700';
    C.beginPath();C.moveTo(8*s,-14*s);C.lineTo(12*s,-22*s);C.lineTo(16*s,-14*s);C.fill();

    // зҒҸжғ§еҸҚ
    C.strokeStyle='#FF6B35';C.lineWidth=4*s;
    C.beginPath();
    C.moveTo(-20*s,0);
    const tailWag = Math.sin(frameCount*0.15)*8*s;
    C.quadraticCurveTo(-32*s,tailWag,-26*s,12*s+tailWag);
    C.stroke();
    C.fillStyle='#FF8C42';
    C.beginPath();C.arc(-26*s,12*s+tailWag,5*s,0,Math.PI*2);C.fill();

    C.restore();
  }
};

// ---- й—…ж»…о•Ійҗ—?----
let obstacles = [];
const Obs = {
  reset(){obstacles=[]},
  spawn(){
    const cfg = DIFF[difficulty];
    if(Math.random()<cfg.obsRate){
      const gap = cfg.gapMin + Math.random()*(cfg.gapMax-cfg.gapMin);
      const topH = 60 + Math.random()*(H-gap-120);
      obstacles.push({
        x:W+20, w:50*SCALE, topH:topH, gap:gap,
        counted:false, color:`hsl(${Math.random()*360},70%,60%)`
      });
    }
  },
  update(){
    const spd = (DIFF[difficulty].speed + speed)*SCALE;
    obstacles.forEach(o=>{
      o.x -= spd;
      // зә°зүҲжҢ’еҰ«вӮ¬еЁҙ?      const dx = Math.abs(Dragon.x - o.x);
      const dy = Dragon.y;
      if(dx < (Dragon.w/2 + o.w/2)){
        if(dy < o.topH || dy > o.topH+o.gap){
          if(Dragon.invincible>0) return;
          if(Dragon.shield>0){Dragon.shield=0;return;}
          Game.hit();
        }
      }
      // з’ҒвҖіеһҺ
      if(!o.counted && o.x < Dragon.x-20){
        o.counted=true;
        score += 1;
      }
    });
    obstacles = obstacles.filter(o=>o.x > -100);
  },
  draw(){
    obstacles.forEach(o=>{
      // ж¶“е©„о…ёй–¬?      const g = C.createLinearGradient(o.x,0,o.x+o.w,o.topH);
      g.addColorStop(0,'#3B82F6');g.addColorStop(1,'#1D4ED8');
      C.fillStyle=g;
      roundRect(o.x,0,o.w,o.topH,8*SCALE);
      // з» пҝ дәҫз”Ҝи—үз“ҷ
      C.fillStyle='#2563EB';
      roundRect(o.x-5*SCALE,o.topH-16*SCALE,o.w+10*SCALE,16*SCALE,4*SCALE);
      // ж¶“е¬¬о…ёй–¬?      const gy = o.topH+o.gap;
      const g2 = C.createLinearGradient(o.x,gy,o.x+o.w,H);
      g2.addColorStop(0,'#3B82F6');g2.addColorStop(1,'#1D4ED8');
      C.fillStyle=g2;
      roundRect(o.x,gy,o.w,H-gy,8*SCALE);
      C.fillStyle='#2563EB';
      roundRect(o.x-5*SCALE,gy,o.w+10*SCALE,16*SCALE,4*SCALE);
    });
  }
};

// ---- й–ІжҲқз«ө ----
let coinsList = [];
const Coins = {
  reset(){coinsList=[]},
  spawn(){
    if(Math.random()<DIFF[difficulty].coinRate){
      coinsList.push({
        x:W+20, y:80+Math.random()*(H-160),
        r:10*SCALE, magnet:false, sparkle:Math.random()*Math.PI*2
      });
    }
  },
  update(){
    const spd = (DIFF[difficulty].speed+speed)*SCALE;
    const magnetRange = Dragon.magnet>0 ? 120*SCALE : 0;
    coinsList.forEach(c=>{
      c.x -= spd;
      c.sparkle += 0.08;
      // зәҫдҫҖжҗ§йҚҡжҗҒжӘ®
      if(magnetRange>0){
        const dx=c.x-Dragon.x, dy=c.y-Dragon.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<magnetRange){
          c.x -= (c.x-Dragon.x)*0.12;
          c.y -= (c.y-Dragon.y)*0.12;
        }
      }
      // йҺ·жғ§еҪҮ
      const dx=c.x-Dragon.x, dy=c.y-Dragon.y;
      if(dx*dx+dy*dy < (c.r+Dragon.w/2)*(c.r+Dragon.w/2)){
        c.collected=true;
        coins++;
        totalCoins++;
        if(navigator.vibrate) navigator.vibrate(8);
      }
    });
    coinsList = coinsList.filter(c=>!c.collected && c.x>-50);
  },
  draw(){
    coinsList.forEach(c=>{
      const glow = 0.6+0.4*Math.sin(c.sparkle);
      C.globalAlpha = glow;
      // й–ІжҲқз«өйҚҸеӨӢжӘҝ
      C.beginPath();C.arc(c.x,c.y,c.r+4*SCALE,0,Math.PI*2);
      C.fillStyle='rgba(255,215,0,0.3)';C.fill();
      C.globalAlpha=1;
      // й–ІжҲқз«ө
      C.beginPath();C.arc(c.x,c.y,c.r,0,Math.PI*2);
      const cg=C.createRadialGradient(c.x-2*SCALE,c.y-2*SCALE,0,c.x,c.y,c.r);
      cg.addColorStop(0,'#FFD700');cg.addColorStop(1,'#B8860B');
      C.fillStyle=cg;C.fill();
      // жҘј з»—п№ҖеҪҝ
      C.fillStyle='#8B6914';C.font=`bold ${12*SCALE}px sans-serif`;
      C.textAlign='center';C.textBaseline='middle';
      C.fillText('жҘј',c.x,c.y+1*SCALE);
    });
  }
};

// ---- й–¬ж’іеҸҝ ----
let powerups = [];
const PowerUps = {
  reset(){powerups=[]},
  maybeSpawn(){
    if(Math.random()<0.006){
      const types = ['shield','magnet','boost'];
      powerups.push({
        x:W+20, y:80+Math.random()*(H-160),
        type:types[Math.floor(Math.random()*types.length)],
        r:14*SCALE, t:0
      });
    }
  },
  update(){
    const spd=(DIFF[difficulty].speed+speed)*SCALE;
    powerups.forEach(p=>{
      p.x-=spd; p.t+=0.06;
      const dx=p.x-Dragon.x, dy=p.y-Dragon.y;
      if(dx*dx+dy*dy<(p.r+Dragon.w/2)*(p.r+Dragon.w/2)){
        p.collected=true;
        if(p.type==='shield'){Dragon.shield=420;toast('йҰғжҙқй””?йҺ¶гӮҮжөҳе©өвӮ¬еЁІ?7з»ү?);}
        if(p.type==='magnet'){Dragon.magnet=420;toast('йҰғР  зәҫдҫҖжҗ§е©өвӮ¬еЁІ?7з»ү?);}
        if(p.type==='boost'){Dragon.boost=300;toast('йҲҝ?йҚ”зҠ»вӮ¬зҶёзёәеЁІдјҷзҙ’');}
        if(navigator.vibrate)navigator.vibrate([20,50,20]);
      }
    });
    powerups=powerups.filter(p=>!p.collected&&p.x>-50);
  },
  draw(){
    powerups.forEach(p=>{
      const glow=0.4+0.3*Math.sin(p.t*3);
      C.globalAlpha=glow+0.5;
      const colors={shield:'#00D4FF',magnet:'#FF69B4',boost:'#FFD700'};
      const icons={shield:'йҰғжҙқ',magnet:'йҰғР ',boost:'йҲҝ?};
      C.beginPath();C.arc(p.x,p.y,p.r+6*SCALE,0,Math.PI*2);
      C.fillStyle=colors[p.type]+'40';C.fill();
      C.globalAlpha=1;
      C.beginPath();C.arc(p.x,p.y,p.r,0,Math.PI*2);
      C.fillStyle=colors[p.type];C.fill();
      C.font=`${16*SCALE}px sans-serif`;
      C.textAlign='center';C.textBaseline='middle';
      C.fillText(icons[p.type],p.x,p.y);
    });
    C.globalAlpha=1;
  }
};

// ---- жөңжҲқзң°й‘іеұҫж«ҷ ----
let clouds = [];
function initClouds(){
  clouds=[];
  for(let i=0;i<8;i++) clouds.push({x:Math.random()*W,y:Math.random()*H*0.7,r:30+Math.random()*60,speed:0.3+Math.random()*0.8,alpha:0.08+Math.random()*0.12});
}
function drawClouds(){
  const spd=(DIFF[difficulty].speed+speed)*0.2;
  clouds.forEach(c=>{
    c.x-=c.speed*SCALE+spd;
    if(c.x<-100){c.x=W+100;c.y=Math.random()*H*0.7;}
    C.globalAlpha=c.alpha;
    C.fillStyle='#A8C0FF';
    C.beginPath();C.arc(c.x,c.y,c.r*SCALE,0,Math.PI*2);C.fill();
    C.beginPath();C.arc(c.x+c.r*0.6*SCALE,c.y-c.r*0.2*SCALE,c.r*0.7*SCALE,0,Math.PI*2);C.fill();
    C.beginPath();C.arc(c.x-c.r*0.5*SCALE,c.y+c.r*0.1*SCALE,c.r*0.8*SCALE,0,Math.PI*2);C.fill();
    C.globalAlpha=1;
  });
}

// ---- йҚҰдјҙжҪ°/жҫ¶в•ғв”–еЁ“ж„¬еҪү ----
function drawSky(){
  const grad = C.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0B0E3B');
  grad.addColorStop(0.5,'#1a1a5e');
  grad.addColorStop(1,'#FF6B3520');
  C.fillStyle=grad;
  C.fillRect(0,0,W,H);
  drawStars();
}

let stars = [];
function initStars(){for(let i=0;i<60;i++) stars.push({x:Math.random()*W,y:Math.random()*H*0.6,r:0.5+Math.random()*1.5,phase:Math.random()*Math.PI*2})}
function drawStars(){
  stars.forEach(s=>{
    s.phase+=0.02;
    C.globalAlpha=0.3+0.4*Math.sin(s.phase);
    C.fillStyle='#fff';
    C.beginPath();C.arc(s.x,s.y,s.r*SCALE,0,Math.PI*2);C.fill();
  });
  C.globalAlpha=1;
}

// ---- HUD ----
function drawHUD(){
  // йҚ’е—ҳжҡҹ
  C.fillStyle='#fff';C.font=`bold ${22*SCALE}px 'Segoe UI',sans-serif`;
  C.textAlign='left';C.textBaseline='top';
  C.fillText(score.toString(), 16*SCALE, 50*SCALE);
  // й–ІжҲқз«ө
  C.fillStyle='#FFD700';C.font=`${14*SCALE}px sans-serif`;
  C.fillText('жҘј'+coins, 16*SCALE, 78*SCALE);
  // йҸҲвӮ¬жҘӮжЁәеһҺ
  C.fillStyle='rgba(255,255,255,0.4)';C.font=`${12*SCALE}px sans-serif`;
  C.textAlign='right';
  C.fillText('BEST: '+best, W-16*SCALE, 50*SCALE);
  // й–¬ж’іеҸҝйҗҳиҲөвӮ¬?  let py=78*SCALE;
  C.textAlign='right';C.font=`${12*SCALE}px sans-serif`;
  if(Dragon.shield>0){C.fillStyle='#00D4FF';C.fillText('йҰғжҙқй””?+Math.ceil(Dragon.shield/60)+'s',W-16*SCALE,py);py+=18*SCALE;}
  if(Dragon.magnet>0){C.fillStyle='#FF69B4';C.fillText('йҰғР '+Math.ceil(Dragon.magnet/60)+'s',W-16*SCALE,py);py+=18*SCALE;}
  if(Dragon.boost>0){C.fillStyle='#FFD700';C.fillText('йҲҝ?+Math.ceil(Dragon.boost/60)+'s',W-16*SCALE,py);py+=18*SCALE;}
  // й–«зҶ·е®ійҸү?  const barW=60*SCALE, barH=4*SCALE;
  C.fillStyle='rgba(255,255,255,0.15)';
  roundRect(W-16*SCALE-barW, py, barW, barH, 2*SCALE);
  C.fillStyle='#FF6B35';
  roundRect(W-16*SCALE-barW, py, barW*(Math.min(speed/8,1)), barH, 2*SCALE);
  C.fillStyle='rgba(255,255,255,0.5)';C.font=`${10*SCALE}px sans-serif`;
  C.textAlign='right';
  C.fillText('SPEED',W-16*SCALE,py+8*SCALE);
}

// ---- Toast ----
let toasts = [];
function toast(msg){
  toasts.push({text:msg,t:90,alpha:1});
}
function drawToasts(){
  toasts.forEach((t,i)=>{
    t.t--; t.alpha = Math.min(1, t.t/20);
    if(t.t<=0) return;
    C.globalAlpha=t.alpha;
    C.fillStyle='rgba(0,0,0,0.6)';
    const tw=C.measureText(t.text).width;
    roundRect(W/2-tw/2-12*SCALE, H-80*SCALE-i*30*SCALE, tw+24*SCALE, 28*SCALE, 14*SCALE);
    C.fillStyle='#fff';C.font=`${13*SCALE}px sans-serif`;C.textAlign='center';
    C.fillText(t.text,W/2,H-68*SCALE-i*30*SCALE);
    C.globalAlpha=1;
  });
  toasts=toasts.filter(t=>t.t>0);
}

// ---- е®ёгғҘеҸҝйҚ‘иҠҘжҡҹ ----
function roundRect(x,y,w,h,r){
  C.beginPath();
  C.moveTo(x+r,y);C.lineTo(x+w-r,y);C.quadraticCurveTo(x+w,y,x+w,y+r);
  C.lineTo(x+w,y+h-r);C.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  C.lineTo(x+r,y+h);C.quadraticCurveTo(x,y+h,x,y+h-r);
  C.lineTo(x,y+r);C.quadraticCurveTo(x,y,x+r,y);
  C.fill();
}

// ---- еЁ“е‘Ҡеһҷй–«жҳҸз·« ----
const Game = {
  start(diff){
    difficulty = diff||'normal';
    state = STATE.PLAYING;
    score=0; coins=0; speed=0; frameCount=0;
    Dragon.reset();
    Obs.reset(); Coins.reset(); PowerUps.reset();
    document.getElementById('startScreen').classList.remove('active');
    document.getElementById('gameOverScreen').classList.remove('active');
  },

  hit(){
    if(Dragon.invincible>0) return;
    shakeTimer=10;
    flashAlpha=0.6;
    Game.over();
  },

  over(){
    state = STATE.OVER;
    if(score>best){best=score;}
    save();
    // йҸ„еү§гҒҡзјҒж’ҙжҪ«йҗЈеІ„жҪ°
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestText').textContent = 'йҸҲвӮ¬жҘӮжЁәеһҺ: '+best;
    document.getElementById('coinText').textContent = '+'+(coins)+' й–ІжҲқз«өй”ӣе ўз–®з’Ғ? '+totalCoins+'й”ӣ?;
    // еҜ°з•ҢзҸ·
    let badges='';
    if(score>=50) badges+=`<span class="badge badge-gold">йҰғејі жӨӢзӮ¶о”‘жҘӮжЁ»еўң 50+</span>`;
    if(score>=20) badges+=`<span class="badge badge-silver">зҢё?йҚ’жҝӢж№¶й–ҝе¬ӯе§ғ 20+</span>`;
    if(coins>=10) badges+=`<span class="badge badge-bronze">йҰғжҢө й–ІжҲқз«өжқҲеҸҘжұү</span>`;
    if(best>=100) badges+=`<span class="badge badge-gold">йҰғжҶ« жөјзҠІоҡҢжӨӢзӮәз·і 100+</span>`;
    document.getElementById('badges').innerHTML=badges;
    document.getElementById('gameOverScreen').classList.add('active');
  },

  restart(){
    Game.start(difficulty);
  },

  home(){
    state=STATE.MENU;
    document.getElementById('bestScore').textContent=best;
    document.getElementById('totalCoins').textContent=totalCoins;
    document.getElementById('startScreen').classList.add('active');
    document.getElementById('gameOverScreen').classList.remove('active');
  },

  update(){
    if(state!==STATE.PLAYING) return;
    frameCount++;
    gameTime++;
    // йҚ”зҠ»вӮ¬?    speed = Math.min(speed+DIFF[difficulty].accel, 10);
    Dragon.update();
    Obs.spawn(); Obs.update();
    Coins.spawn(); Coins.update();
    PowerUps.maybeSpawn(); PowerUps.update();
    // йҚ”г„ҰвӮ¬дҫҖжҜҰжҗҙпёјзҙ°е§Ј?00йҚ’е——е§һй–«?    if(score>0 && score%500===0 && frameCount%60===0){
      speed=Math.min(speed+0.5,12);
    }
  },

  draw(){
    C.clearRect(0,0,W,H);
    drawSky();
    drawClouds();
    if(state===STATE.PLAYING || state===STATE.OVER){
      Obs.draw();
      Coins.draw();
      PowerUps.draw();
      Dragon.draw();
      drawHUD();
      drawToasts();
      // й–«зҶ·е®ійҚҗжҸ’еҹЎйҗ—и§„жҷҘ
      if(Dragon.boost>0){
        C.globalAlpha=0.08+0.04*Math.sin(frameCount*0.3);
        C.fillStyle='#FFD700';
        C.fillRect(0,0,W,H);
        C.globalAlpha=1;
      }
    }
    // зҒһеҝ“з®·й—Үеӣ§е§©
    if(shakeTimer>0){
      shakeTimer--;
      const sx=(Math.random()-0.5)*shakeTimer*2;
      const sy=(Math.random()-0.5)*shakeTimer*2;
      C.translate(sx,sy);
      // з»ҫгҲЈеЈҠй—ӮоҒҶе„Ҡ
      if(flashAlpha>0){
        C.globalAlpha=flashAlpha;
        C.fillStyle='#FF0000';C.fillRect(0,0,W,H);
        flashAlpha-=0.05;
        C.globalAlpha=1;
      }
    }
  }
};

// ---- жқҲж’іеҸҶ ----
function onFlap(e){
  e.preventDefault();
  if(state===STATE.PLAYING) Dragon.flapUp();
}
Canvas.addEventListener('mousedown', onFlap);
Canvas.addEventListener('touchstart', onFlap);
document.addEventListener('keydown', e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();if(state===STATE.PLAYING)Dragon.flapUp();}});

// ---- ж¶“иҜІжғҠйҗң?----
function loop(){
  resize();
  Game.update();
  Game.draw();
  requestAnimationFrame(loop);
}

// ---- йҚ’жҝҶоқҗйҚ–?----
initStars();
initClouds();
document.getElementById('bestScore').textContent=best;
document.getElementById('totalCoins').textContent=totalCoins;
loop();
</script>
