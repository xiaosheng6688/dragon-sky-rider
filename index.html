<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Dragon Rider</title>
<style>
*{margin:0;padding:0}
body{background:#2d5a27;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,roadL,roadR,laneW,lane=1,yOff=0;
let px,py,pw=50,ph=60;
let score=0,coins=0,lives=3,speed=3,frame=0;
let obs=[],cn=[],pts=[];
let over=false,flash=0;

function rs(){
  W=innerWidth;H=innerHeight;c.width=W;c.height=H;
  roadL=W*.1;roadR=W*.9;laneW=(roadR-roadL)/3;
  px=roadL+laneW*1.5;py=H-120-ph/2;
}rs();onresize=rs;

// --- obstacles & coins ---
function so(){
  if(Math.random()<.025&&frame%3==0){const l=Math.floor(Math.random()*3);obs.push({l,x:roadL+laneW*(l+.5),y:-80,w:44,h:64,hit:false})}
}
function sc(){
  if(Math.random()<.035){const l=Math.floor(Math.random()*3);cn.push({l,y:-30,r:11,dead:false})}
}

// --- update ---
function up(){
  if(over)return;
  frame++;yOff+=speed*.7;
  const tx=roadL+laneW*(lane+.5);px+=(tx-px)*.3;
  speed=3+frame*.003;
  so();sc();

  for(let o of obs){o.y+=speed;o.x=roadL+laneW*(o.l+.5);
    if(!o.hit&&Math.abs(o.x-px)<pw*.8&&Math.abs((o.y)-(py))<ph*.8){o.hit=true;lives--;pts.push({x:px,y:py,vx:0,vy:-4,life:30,c:'#f44'});flash=.35;if(lives<=0)over=true}
  }obs=obs.filter(o=>o.y<H+150);

  for(let c of cn){c.y+=speed;if(Math.abs(c.y-py)<ph*.7&&c.l===lane&&!c.dead){c.dead=true;coins++;score+=3;}if(c.y>H+30)c.dead=true}cn=cn.filter(c=>!c.dead);

  for(let p of pts){p.y+=p.vy;p.life--}pts=pts.filter(p=>p.life>0);
  if(flash>0)flash-=.02;
}

// --- draw ---
function dbg(){
  // Sky
  const g=x.createLinearGradient(0,0,0,H*.6);
  g.addColorStop(0,'#1a1a4e');g.addColorStop(.5,'#2d1b69');g.addColorStop(1,'#4a2c8a');
  x.fillStyle=g;x.fillRect(0,0,W,H*.65);
  // Stars
  for(let i=0;i<30;i++){const sx=(i*173+frame)%W,sy=(i*71+H*.2)%(H*.6);x.globalAlpha=.2+.3*Math.sin(frame*.02+i);x.fillStyle='#fff';x.beginPath();x.arc(sx,sy,1+.5*Math.random(),0,7);x.fill()}x.globalAlpha=1;
  // Green grass on sides
  x.fillStyle='#2d5a27';x.fillRect(0,0,roadL,H);
  x.fillRect(roadR,0,W-roadR,H);
  // Trees on sides
  for(let i=0;i<8;i++){const tx=-60+i*((roadL+60)/7),ty=H*.3+(i*73)%(H*.4);x.fillStyle='#1a3a15';x.beginPath();x.moveTo(tx-20,ty+30);x.lineTo(tx,ty-20);x.lineTo(tx+20,ty+30);x.fill();x.fillStyle='#4a2a0a';x.fillRect(tx-4,ty+30,8,18)}
  for(let i=0;i<8;i++){const tx=roadR+40+i*((W-roadR-40)/7),ty=H*.25+(i*79)%(H*.45);x.fillStyle='#1a3a15';x.beginPath();x.moveTo(tx-20,ty+30);x.lineTo(tx,ty-20);x.lineTo(tx+20,ty+30);x.fill();x.fillStyle='#4a2a0a';x.fillRect(tx-4,ty+30,8,18)}
}

function droad(){
  const rw=roadR-roadL;
  // Road surface
  x.fillStyle='#4a4a5a';x.fillRect(roadL,0,rw,H);
  // Center dashes
  for(let i=0;i<3;i++){
    const lx=roadL+laneW*(i+.5);
    x.fillStyle='rgba(255,255,255,.12)';
    const dOff=yOff%60;
    for(let j=-60+dOff;j<H;j+=60)x.fillRect(lx-10,j,20,8);
  }
  // Road border
  x.strokeStyle='#FFD700';x.lineWidth=3;
  x.strokeRect(roadL-2,0,roadR-roadL+4,H);
  // Lane lines
  for(let i=1;i<3;i++){const lx=roadL+laneW*i;x.strokeStyle='rgba(255,255,255,.25)';x.lineWidth=2;x.setLineDash([25,18]);x.beginPath();x.moveTo(lx,0);x.lineTo(lx,H);x.stroke();x.setLineDash([])}
}

function dplayer(){
  x.save();x.translate(px,py);
  // Shadow
  x.fillStyle='rgba(0,0,0,.45)';x.beginPath();x.ellipse(0,ph*.38,pw*.5,5,0,0,7);x.fill();
  // Body
  const g=x.createLinearGradient(0,-ph/2,0,ph/2);
  g.addColorStop(0,'#FF9642');g.addColorStop(.4,'#FF6B35');g.addColorStop(1,'#CC3A00');
  x.fillStyle=g;rr(-pw/2,-ph/2,pw,ph,14);
  // Windshield
  x.fillStyle='rgba(190,220,255,.5)';x.fillRect(-pw*.22,-ph*.36,pw*.44,ph*.25);
  // Headlights
  x.fillStyle='#FFEEC0';x.beginPath();x.arc(-pw*.28,0,pw*.1,0,7);x.fill();x.beginPath();x.arc(pw*.28,0,pw*.1,0,7);x.fill();
  // Wheels
  x.fillStyle='#222';rr(-pw*.46,ph*.26,pw*.18,ph*.12,3);rr(pw*.28,ph*.26,pw*.18,ph*.12,3);
  // Flame
  const fh=14+Math.sin(frame*.22)*5;
  x.fillStyle='#FF3B2F';x.beginPath();x.moveTo(-pw*.13,ph/2);x.lineTo(0,ph/2+fh);x.lineTo(pw*.13,ph/2);x.fill();
  x.fillStyle='#FFCC00';x.beginPath();x.moveTo(-pw*.06,ph/2);x.lineTo(0,ph/2+fh*.55);x.lineTo(pw*.06,ph/2);x.fill();
  // Dragon head emblem
  x.fillStyle='#FFAA00';x.beginPath();x.moveTo(-pw*.1,-ph*.48);x.lineTo(0,-ph*.35);x.lineTo(pw*.1,-ph*.48);x.fill();
  x.fillStyle='#111';x.beginPath();x.arc(-pw*.05,-ph*.44,2.5,0,7);x.fill();x.beginPath();x.arc(pw*.05,-ph*.44,2.5,0,7);x.fill();
  x.restore();
}

function dobs(){
  for(let o of obs){if(o.y<-80||o.y>H+80)continue;
    x.fillStyle='#DC2626';rr(o.x-o.w/2,o.y-o.h/2,o.w,o.h,8);
    x.strokeStyle='#7F1D1D';x.lineWidth=2;
    x.beginPath();x.moveTo(o.x-o.w/2,o.y-o.h/2+10);x.lineTo(o.x+o.w/2,o.y-o.h/2+10);x.stroke();
    x.beginPath();x.moveTo(o.x-o.w/2,o.y+o.h/2-10);x.lineTo(o.x+o.w/2,o.y+o.h/2-10);x.stroke();
  }
}

function dcoins(){
  for(let c of cn){if(c.y<-15||c.dead)continue;
    const cx=roadL+laneW*(c.l+.5);
    const g=x.createRadialGradient(cx-2,c.y-2,1,cx,c.y,c.r);
    g.addColorStop(0,'#FFE44D');g.addColorStop(1,'#B8860B');
    x.fillStyle=g;x.beginPath();x.arc(cx,c.y,c.r,0,7);x.fill();
    x.fillStyle='#8B6914';x.font='bold 13px arial';x.textAlign='center';x.textBaseline='middle';x.fillText('楼',cx,c.y+1);
  }
}

function dpts(){
  for(let p of pts){x.globalAlpha=p.life/30;x.fillStyle=p.c;x.beginPath();x.arc(p.x,p.y,3,0,7);x.fill()}x.globalAlpha=1;
}

function dhud(){
  x.textAlign='left';
  // Score panel
  x.fillStyle='rgba(0,0,0,.5)';rr(6,6,120,54,10);
  x.fillStyle='#fff';x.font='bold 20px monospace';x.fillText('馃弳 '+score,14,30);
  x.font='16px monospace';x.fillText('馃挵 '+coins,14,50);
  // Lives
  x.textAlign='right';
  x.fillStyle='rgba(0,0,0,.5)';rr(W-66,6,60,30,10);
  x.fillStyle='#ef4444';x.font='20px serif';x.fillText('鈾?.repeat(lives),W-14,28);
  // Hint
  x.textAlign='center';
  x.fillStyle='rgba(255,255,255,.15)';x.font='12px monospace';
  x.fillText('鈼€ swipe left/right to switch lane 鈻?,W/2,H-8);
}

function rr(x,y,w,h,r){
  x.beginPath();x.moveTo(x+r,y);x.lineTo(x+w-r,y);x.quadraticCurveTo(x+w,y,x+w,y+r);
  x.lineTo(x+w,y+h-r);x.quadraticCurveTo(x+w,y+h,x+w-r,y+h);x.lineTo(x+r,y+h);
  x.quadraticCurveTo(x,y+h,x,y+h-r);x.lineTo(x,y+r);x.quadraticCurveTo(x,y,x+r,y);x.closePath();x.fill();
}

// --- input ---
let sx2=0,sy2=0;
document.addEventListener('touchstart',e=>{sx2=e.touches[0].clientX;sy2=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx2,dy=e.changedTouches[0].clientY-sy2;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>18){lane=Math.max(0,Math.min(2,lane+(dx>0?1:-1)))}
  else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>18){lane=Math.max(0,Math.min(2,lane+(dy>0?1:-1)))}
});
document.addEventListener('click',e=>{
  if(over){lives=3;score=0;coins=0;over=false;obs=[];cn=[];speed=3;frame=0}else{lane=e.clientX<W/2?Math.max(0,lane-1):Math.min(2,lane+1)}
});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')lane=Math.max(0,lane-1);if(e.key==='ArrowRight')lane=Math.min(2,lane+1)});

// --- game loop ---
(function loop(){
  up();
  x.save();
  dbg();droad();dobs();dcoins();dplayer();dpts();dhud();
  if(over){
    x.fillStyle='rgba(0,0,0,.75)';x.fillRect(0,0,W,H);
    x.textAlign='center';
    x.fillStyle='#ff6b35';x.font='bold 38px monospace';x.fillText('GAME OVER',W/2,H/2-24);
    x.fillStyle='#fff';x.font='18px monospace';x.fillText('Score: '+score+'  |  馃挵 '+coins,W/2,H/2+12);
    x.fillText('Tap anywhere to restart',W/2,H/2+36);
  }
  x.restore();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
